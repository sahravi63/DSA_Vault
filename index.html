 nums) {\n    vector<vector<int>> res;\n    vector<int> path;\n    vector<bool> used(nums.size(), false);\n    backtrack(nums, used, path, res);\n    return res;\n}\n// Time: O(n!)  Space: O(n)", "explanation": "Backtracking that builds paths one element at a time, tracking which numbers are already used, and records a complete permutation once the path reaches full length.", "example": {"input": "nums = [1,2,3]", "output": "6 permutations, e.g. [1,2,3],[1,3,2],[2,1,3]..."}}, {"category": "Backtracking", "title": "Combination Sum", "difficulty": "Medium", "code": "void backtrack(vector<int>& candidates, int target, int start, vector<int>& path, vector<vector<int>>& res) {\n    if (target == 0) { res.push_back(path); return; }\n    for (int i = start; i < candidates.size(); i++) {\n        if (candidates[i] > target) continue;\n        path.push_back(candidates[i]);\n        backtrack(candidates, target - candidates[i], i, path, res); // i, not i+1 (reuse allowed)\n        path.pop_back();\n    }\n}\nvector<vector<int>> combinationSum(vector<int>& candidates, int target) {\n    vector<vector<int>> res;\n    vector<int> path;\n    sort(candidates.begin(), candidates.end());\n    backtrack(candidates, target, 0, path, res);\n    return res;\n}\n// Time: O(2^target)  Space: O(target)", "explanation": "Backtracking that tries each candidate at or above the current one (allowing reuse) and subtracts it from the remaining target, recording a solution when the target hits zero.", "example": {"input": "candidates = [2,3,6,7], target = 7", "output": "[[2,2,3],[7]]"}}, {"category": "Backtracking", "title": "Generate Parentheses", "difficulty": "Medium", "code": "void backtrack(int n, int open, int close, string& path, vector<string>& res) {\n    if (path.size() == 2 * n) { res.push_back(path); return; }\n    if (open < n) { path.push_back('('); backtrack(n, open + 1, close, path, res); path.pop_back(); }\n    if (close < open) { path.push_back(')'); backtrack(n, open, close + 1, path, res); path.pop_back(); }\n}\nvector<string> generateParenthesis(int n) {\n    vector<string> res;\n    string path;\n    backtrack(n, 0, 0, path, res);\n    return res;\n}\n// Time: O(4^n / sqrt(n)) Catalan  Space: O(n)", "explanation": "Backtracking that only adds '(' if fewer than n have been used, and only adds ')' if it wouldn't outnumber the '(' used so far, guaranteeing every generated string is valid.", "example": {"input": "n = 3", "output": "[\"((()))\",\"(()())\",\"(())()\",\"()(())\",\"()()()\"]"}}, {"category": "Backtracking", "title": "Word Search", "difficulty": "Medium", "code": "bool dfs(vector<vector<char>>& board, string& word, int i, int j, int idx) {\n    if (idx == word.size()) return true;\n    if (i < 0 || i >= board.size() || j < 0 || j >= board[0].size() || board[i][j] != word[idx])\n        return false;\n    char temp = board[i][j];\n    board[i][j] = '#';\n    bool found = dfs(board, word, i+1, j, idx+1) || dfs(board, word, i-1, j, idx+1) ||\n                 dfs(board, word, i, j+1, idx+1) || dfs(board, word, i, j-1, idx+1);\n    board[i][j] = temp;\n    return found;\n}\nbool exist(vector<vector<char>>& board, string word) {\n    for (int i = 0; i < board.size(); i++)\n        for (int j = 0; j < board[0].size(); j++)\n            if (dfs(board, word, i, j, 0)) return true;\n    return false;\n}\n// Time: O(m*n*4^L)  Space: O(L)", "explanation": "DFS from every cell, matching the word character by character and temporarily marking visited cells so the same cell isn't reused within one path, restoring it on backtrack.", "example": {"input": "board with word \"ABCCED\"", "output": "true"}}, {"category": "Backtracking", "title": "Palindrome Partitioning", "difficulty": "Medium", "code": "bool isPalindrome(const string& s, int l, int r) {\n    while (l < r) if (s[l++] != s[r--]) return false;\n    return true;\n}\nvoid backtrack(string& s, int start, vector<string>& path, vector<vector<string>>& res) {\n    if (start == s.size()) { res.push_back(path); return; }\n    for (int end = start; end < s.size(); end++) {\n        if (isPalindrome(s, start, end)) {\n            path.push_back(s.substr(start, end - start + 1));\n            backtrack(s, end + 1, path, res);\n            path.pop_back();\n        }\n    }\n}\nvector<vector<string>> partition(string s) {\n    vector<vector<string>> res;\n    vector<string> path;\n    backtrack(s, 0, path, res);\n    return res;\n}\n// Time: O(n * 2^n)  Space: O(n)", "explanation": "Backtracking that tries every prefix of the remaining string as the next partition, only recursing further when that prefix is itself a palindrome.", "example": {"input": "s = \"aab\"", "output": "[[\"a\",\"a\",\"b\"],[\"aa\",\"b\"]]"}}, {"category": "Backtracking", "title": "N-Queens", "difficulty": "Hard", "code": "bool isSafe(vector<string>& board, int row, int col, int n) {\n    for (int i = 0; i < row; i++) if (board[i][col] == 'Q') return false;\n    for (int i = row-1, j = col-1; i >= 0 && j >= 0; i--, j--) if (board[i][j] == 'Q') return false;\n    for (int i = row-1, j = col+1; i >= 0 && j < n; i--, j++) if (board[i][j] == 'Q') return false;\n    return true;\n}\nvoid backtrack(vector<string>& board, int row, int n, vector<vector<string>>& res) {\n    if (row == n) { res.push_back(board); return; }\n    for (int col = 0; col < n; col++) {\n        if (isSafe(board, row, col, n)) {\n            board[row][col] = 'Q';\n            backtrack(board, row + 1, n, res);\n            board[row][col] = '.';\n        }\n    }\n}\nvector<vector<string>> solveNQueens(int n) {\n    vector<vector<string>> res;\n    vector<string> board(n, string(n, '.'));\n    backtrack(board, 0, n, res);\n    return res;\n}\n// Time: O(n!)  Space: O(n^2)", "explanation": "Backtracking places one queen per row, checking column and both diagonals for conflicts before placing, and backtracks when no column in the current row works.", "example": {"input": "n = 4", "output": "2 valid board arrangements"}}, {"category": "Backtracking", "title": "Subsets II", "difficulty": "Medium", "code": "void backtrack(vector<int>& nums, int start, vector<int>& path, vector<vector<int>>& res) {\n    res.push_back(path);\n    for (int i = start; i < nums.size(); i++) {\n        if (i > start && nums[i] == nums[i - 1]) continue;\n        path.push_back(nums[i]);\n        backtrack(nums, i + 1, path, res);\n        path.pop_back();\n    }\n}\nvector<vector<int>> subsetsWithDup(vector<int>& nums) {\n    sort(nums.begin(), nums.end());\n    vector<vector<int>> res;\n    vector<int> path;\n    backtrack(nums, 0, path, res);\n    return res;\n}\n// Time: O(2^n)  Space: O(n)", "explanation": "Same subset backtracking as the basic version, but the array is sorted first and a duplicate value is skipped whenever it repeats the previous choice at the same recursion depth, preventing duplicate subsets.", "example": {"input": "nums = [1,2,2]", "output": "[[],[1],[1,2],[1,2,2],[2],[2,2]]"}}, {"category": "Backtracking", "title": "Combination Sum II", "difficulty": "Medium", "code": "void backtrack(vector<int>& candidates, int target, int start, vector<int>& path, vector<vector<int>>& res) {\n    if (target == 0) { res.push_back(path); return; }\n    for (int i = start; i < candidates.size(); i++) {\n        if (i > start && candidates[i] == candidates[i - 1]) continue;\n        if (candidates[i] > target) break;\n        path.push_back(candidates[i]);\n        backtrack(candidates, target - candidates[i], i + 1, path, res); // i+1, no reuse\n        path.pop_back();\n    }\n}\nvector<vector<int>> combinationSum2(vector<int>& candidates, int target) {\n    sort(candidates.begin(), candidates.end());\n    vector<vector<int>> res;\n    vector<int> path;\n    backtrack(candidates, target, 0, path, res);\n    return res;\n}\n// Time: O(2^n)  Space: O(target)", "explanation": "Backtracking similar to Combination Sum, but each candidate can only be used once (recurse from i+1) and the array is sorted so duplicate values at the same depth are skipped to avoid duplicate combinations.", "example": {"input": "candidates = [10,1,2,7,6,1,5], target = 8", "output": "[[1,1,6],[1,2,5],[1,7],[2,6]]"}}, {"category": "Backtracking", "title": "Rat in a Maze", "difficulty": "Medium", "code": "bool isSafe(vector<vector<int>>& maze, int x, int y, int n) {\n    return x >= 0 && x < n && y >= 0 && y < n && maze[x][y] == 1;\n}\nvoid solve(vector<vector<int>>& maze, int x, int y, int n, vector<vector<int>>& sol, vector<string>& res, string path) {\n    if (x == n - 1 && y == n - 1) { res.push_back(path); return; }\n    int dx[4] = {1, 0, 0, -1};\n    int dy[4] = {0, -1, 1, 0};\n    char dir[4] = {'D', 'L', 'R', 'U'};\n    for (int i = 0; i < 4; i++) {\n        int nx = x + dx[i], ny = y + dy[i];\n        if (isSafe(maze, nx, ny, n) && !sol[nx][ny]) {\n            sol[nx][ny] = 1;\n            solve(maze, nx, ny, n, sol, res, path + dir[i]);\n            sol[nx][ny] = 0;\n        }\n    }\n}\nvector<string> findPath(vector<vector<int>>& maze, int n) {\n    vector<string> res;\n    if (maze[0][0] == 0) return res;\n    vector<vector<int>> sol(n, vector<int>(n, 0));\n    sol[0][0] = 1;\n    solve(maze, 0, 0, n, sol, res, \"\");\n    return res;\n}\n// Backtracking - Time: O(4^(n^2)) worst case  Space: O(n^2)", "explanation": "Backtracking that explores all four directions from the current cell, marking cells visited on the current path, and records a path string whenever the bottom-right cell is reached; visited marks are undone on backtrack to allow other paths.", "example": {"input": "maze = [[1,0,0,0],[1,1,0,1],[1,1,0,0],[0,1,1,1]], n = 4", "output": "[\"DDRDRR\",\"DRDDRR\"]"}}, {"category": "DP Concepts", "title": "Fibonacci", "difficulty": "Easy", "code": "int fib(int n) {\n    if (n <= 1) return n;\n    int prev2 = 0, prev1 = 1;\n    for (int i = 2; i <= n; i++) {\n        int cur = prev1 + prev2;\n        prev2 = prev1;\n        prev1 = cur;\n    }\n    return prev1;\n}\n// Bottom-up DP - Time: O(n)  Space: O(1)", "explanation": "Bottom-up DP: build up from the base cases using two rolling variables instead of recomputing overlapping subproblems recursively.", "example": {"input": "n = 6", "output": "8"}}, {"category": "DP Concepts", "title": "0-1 Knapsack", "difficulty": "Medium", "code": "int knapsack01(vector<int>& wt, vector<int>& val, int W) {\n    int n = wt.size();\n    vector<vector<int>> dp(n + 1, vector<int>(W + 1, 0));\n    for (int i = 1; i <= n; i++) {\n        for (int w = 0; w <= W; w++) {\n            dp[i][w] = dp[i-1][w]; // don't take item i-1\n            if (wt[i-1] <= w)\n                dp[i][w] = max(dp[i][w], dp[i-1][w - wt[i-1]] + val[i-1]); // take it\n        }\n    }\n    return dp[n][W];\n}\n// Each item used at most once - Time: O(n*W)  Space: O(n*W)", "explanation": "2D DP where dp[i][w] considers each item exactly once — either skip it (carry dp[i-1][w] forward) or take it if it fits (dp[i-1][w-weight] + value) — taking the better option.", "example": {"input": "wt = [1,3,4,5], val = [1,4,5,7], W = 7", "output": "9"}}, {"category": "DP Concepts", "title": "Unbounded Knapsack", "difficulty": "Medium", "code": "int unboundedKnapsack(vector<int>& wt, vector<int>& val, int W) {\n    vector<int> dp(W + 1, 0);\n    for (int w = 1; w <= W; w++)\n        for (int i = 0; i < wt.size(); i++)\n            if (wt[i] <= w)\n                dp[w] = max(dp[w], dp[w - wt[i]] + val[i]);\n    return dp[W];\n}\n// Items can repeat (inner loop reuses dp[w]) - Time: O(n*W)  Space: O(W)", "explanation": "Similar to 0-1 knapsack, but items can be reused any number of times, so the DP references dp[w] itself (not a 'previous row') when deciding to take an item again.", "example": {"input": "wt = [1,3,4], val = [1,4,5], W = 7", "output": "8"}}, {"category": "DP Concepts", "title": "LCS (Longest Common Subsequence)", "difficulty": "Medium", "code": "int lcs(string s1, string s2) {\n    int m = s1.size(), n = s2.size();\n    vector<vector<int>> dp(m + 1, vector<int>(n + 1, 0));\n    for (int i = 1; i <= m; i++)\n        for (int j = 1; j <= n; j++)\n            dp[i][j] = (s1[i-1] == s2[j-1]) ? dp[i-1][j-1] + 1\n                                             : max(dp[i-1][j], dp[i][j-1]);\n    return dp[m][n];\n}\n// Classic 2D DP - Time: O(m*n)  Space: O(m*n), reducible to O(min(m,n))", "explanation": "Same 2D DP pattern as the Strings-category version: match characters diagonally when equal, otherwise carry forward the best of skipping one character from either string.", "example": {"input": "s1 = \"ABCBDAB\", s2 = \"BDCABA\"", "output": "4"}}, {"category": "DP Concepts", "title": "Kadane's Algorithm (Arrays)", "difficulty": "Easy", "code": "int kadane(vector<int>& nums) {\n    int maxSoFar = nums[0], maxEndingHere = nums[0];\n    for (int i = 1; i < nums.size(); i++) {\n        maxEndingHere = max(nums[i], maxEndingHere + nums[i]);\n        maxSoFar = max(maxSoFar, maxEndingHere);\n    }\n    return maxSoFar;\n}\n// Maximum Subarray Sum - Time: O(n)  Space: O(1)", "explanation": "At each index, decide whether extending the previous subarray or starting fresh at the current element gives a larger sum, tracking the best sum seen overall.", "example": {"input": "nums = [-2,1,-3,4,-1,2,1,-5,4]", "output": "6"}}, {"category": "DP Concepts", "title": "Catalan Number", "difficulty": "Medium", "code": "long long catalan(int n) {\n    vector<long long> dp(n + 1, 0);\n    dp[0] = 1;\n    for (int i = 1; i <= n; i++)\n        for (int j = 0; j < i; j++)\n            dp[i] += dp[j] * dp[i - 1 - j];\n    return dp[n];\n}\n// C(n) = sum(C(i)*C(n-1-i)) - used in BST count, parentheses, etc.\n// Time: O(n^2)  Space: O(n)", "explanation": "DP where C(n) is built from the sum of products of smaller Catalan numbers (C(i) * C(n-1-i)) — the same recurrence that counts balanced parentheses, BST shapes, and more.", "example": {"input": "n = 4", "output": "14"}}, {"category": "DP Concepts", "title": "DP on Grid (2D Arrays)", "difficulty": "Medium", "code": "int uniquePathsWithObstacles(vector<vector<int>>& grid) {\n    int m = grid.size(), n = grid[0].size();\n    vector<vector<long>> dp(m, vector<long>(n, 0));\n    for (int i = 0; i < m; i++) {\n        for (int j = 0; j < n; j++) {\n            if (grid[i][j] == 1) { dp[i][j] = 0; continue; }\n            if (i == 0 && j == 0) { dp[i][j] = 1; continue; }\n            long fromTop  = (i > 0) ? dp[i-1][j] : 0;\n            long fromLeft = (j > 0) ? dp[i][j-1] : 0;\n            dp[i][j] = fromTop + fromLeft;\n        }\n    }\n    return dp[m-1][n-1];\n}\n// Grid DP (Unique Paths II variant) - Time: O(m*n)  Space: O(m*n)", "explanation": "Standard grid DP: the number of ways to reach a cell is the sum of ways to reach the cell above and the cell to the left, with obstacle cells forced to 0 and the top-left cell seeded as 1.", "example": {"input": "grid = [[0,0,0],[0,1,0],[0,0,0]]", "output": "2"}}, {"category": "Sorting Algorithms", "title": "Merge Sort", "difficulty": "Medium", "code": "void merge(vector<int>& arr, int l, int m, int r) {\n    vector<int> left(arr.begin() + l, arr.begin() + m + 1);\n    vector<int> right(arr.begin() + m + 1, arr.begin() + r + 1);\n    int i = 0, j = 0, k = l;\n    while (i < left.size() && j < right.size())\n        arr[k++] = (left[i] <= right[j]) ? left[i++] : right[j++];\n    while (i < left.size()) arr[k++] = left[i++];\n    while (j < right.size()) arr[k++] = right[j++];\n}\nvoid mergeSort(vector<int>& arr, int l, int r) {\n    if (l >= r) return;\n    int m = l + (r - l) / 2;\n    mergeSort(arr, l, m);\n    mergeSort(arr, m + 1, r);\n    merge(arr, l, m, r);\n}\n// Divide and Conquer - Time: O(n log n)  Space: O(n)", "explanation": "Divide and conquer: recursively split the array in half until subarrays of size 1, then merge sorted halves back together by repeatedly taking the smaller of the two fronts.", "example": {"input": "arr = [38,27,43,3,9,82,10]", "output": "[3,9,10,27,38,43,82]"}}, {"category": "Sorting Algorithms", "title": "Quick Sort", "difficulty": "Medium", "code": "int partition(vector<int>& arr, int low, int high) {\n    int pivot = arr[high];\n    int i = low - 1;\n    for (int j = low; j < high; j++) {\n        if (arr[j] < pivot) swap(arr[++i], arr[j]);\n    }\n    swap(arr[i + 1], arr[high]);\n    return i + 1;\n}\nvoid quickSort(vector<int>& arr, int low, int high) {\n    if (low < high) {\n        int pi = partition(arr, low, high);\n        quickSort(arr, low, pi - 1);\n        quickSort(arr, pi + 1, high);\n    }\n}\n// Average: O(n log n), Worst: O(n^2)  Space: O(log n)", "explanation": "Lomuto partition scheme: pick the last element as pivot, rearrange the array so smaller elements move left of the pivot's final position, then recursively sort the two partitions on either side.", "example": {"input": "arr = [10,7,8,9,1,5]", "output": "[1,5,7,8,9,10]"}}, {"category": "Union Find", "title": "Number of Provinces", "difficulty": "Medium", "code": "int find(vector<int>& parent, int x) {\n    if (parent[x] != x) parent[x] = find(parent, parent[x]);\n    return parent[x];\n}\nvoid unite(vector<int>& parent, vector<int>& rnk, int x, int y) {\n    int rx = find(parent, x), ry = find(parent, y);\n    if (rx == ry) return;\n    if (rnk[rx] < rnk[ry]) swap(rx, ry);\n    parent[ry] = rx;\n    if (rnk[rx] == rnk[ry]) rnk[rx]++;\n}\nint findCircleNum(vector<vector<int>>& isConnected) {\n    int n = isConnected.size();\n    vector<int> parent(n), rnk(n, 0);\n    for (int i = 0; i < n; i++) parent[i] = i;\n    for (int i = 0; i < n; i++)\n        for (int j = i + 1; j < n; j++)\n            if (isConnected[i][j] == 1) unite(parent, rnk, i, j);\n    unordered_set<int> roots;\n    for (int i = 0; i < n; i++) roots.insert(find(parent, i));\n    return roots.size();\n}\n// Union-Find (DSU) - Time: O(n^2 * a(n))  Space: O(n)", "explanation": "Union-Find with path compression and union by rank groups directly-or-indirectly connected cities into sets; the answer is the number of distinct root parents remaining after processing all connections.", "example": {"input": "isConnected = [[1,1,0],[1,1,0],[0,0,1]]", "output": "2"}}, {"category": "Union Find", "title": "Redundant Connection", "difficulty": "Medium", "code": "int find(vector<int>& parent, int x) {\n    while (parent[x] != x) x = parent[x];\n    return x;\n}\nvector<int> findRedundantConnection(vector<vector<int>>& edges) {\n    int n = edges.size();\n    vector<int> parent(n + 1);\n    for (int i = 0; i <= n; i++) parent[i] = i;\n    for (auto& e : edges) {\n        int ru = find(parent, e[0]), rv = find(parent, e[1]);\n        if (ru == rv) return e;\n        parent[ru] = rv;\n    }\n    return {};\n}\n// Union-Find - Time: O(n * a(n))  Space: O(n)", "explanation": "Process edges in order, unioning their endpoints; the first edge whose two endpoints already share a root would create a cycle, making it the redundant connection to remove.", "example": {"input": "edges = [[1,2],[1,3],[2,3]]", "output": "[2,3]"}}, {"category": "Trie", "title": "Implement Trie (Prefix Tree)", "difficulty": "Medium", "code": "class Trie {\n    struct Node {\n        Node* children[26] = {};\n        bool isEnd = false;\n    };\n    Node* root;\npublic:\n    Trie() { root = new Node(); }\n\n    void insert(string word) {\n        Node* cur = root;\n        for (char c : word) {\n            if (!cur->children[c - 'a']) cur->children[c - 'a'] = new Node();\n            cur = cur->children[c - 'a'];\n        }\n        cur->isEnd = true;\n    }\n\n    bool search(string word) {\n        Node* node = find(word);\n        return node && node->isEnd;\n    }\n\n    bool startsWith(string prefix) {\n        return find(prefix) != nullptr;\n    }\n\nprivate:\n    Node* find(string& s) {\n        Node* cur = root;\n        for (char c : s) {\n            if (!cur->children[c - 'a']) return nullptr;\n            cur = cur->children[c - 'a'];\n        }\n        return cur;\n    }\n};\n// insert/search/startsWith - Time: O(L) each  Space: O(total chars)", "explanation": "Each Trie node holds 26 child pointers for lowercase letters plus an end-of-word flag; insert walks/creates nodes character by character, while search and startsWith both walk existing nodes and differ only in whether the final node must be flagged as a complete word.", "example": {"input": "insert(\\\"apple\\\"); search(\\\"apple\\\"); search(\\\"app\\\"); startsWith(\\\"app\\\")", "output": "true, false, true"}}, {"category": "Trie", "title": "Word Search II", "difficulty": "Hard", "code": "struct TrieNode {\n    TrieNode* children[26] = {};\n    string word = \"\";\n};\nvoid addWord(TrieNode* root, const string& w) {\n    TrieNode* cur = root;\n    for (char c : w) {\n        if (!cur->children[c - 'a']) cur->children[c - 'a'] = new TrieNode();\n        cur = cur->children[c - 'a'];\n    }\n    cur->word = w;\n}\nvoid dfs(vector<vector<char>>& board, int i, int j, TrieNode* node, vector<string>& res) {\n    if (i < 0 || i >= board.size() || j < 0 || j >= board[0].size() || board[i][j] == '#') return;\n    char c = board[i][j];\n    TrieNode* next = node->children[c - 'a'];\n    if (!next) return;\n    if (!next->word.empty()) { res.push_back(next->word); next->word = \"\"; }\n    board[i][j] = '#';\n    dfs(board, i + 1, j, next, res); dfs(board, i - 1, j, next, res);\n    dfs(board, i, j + 1, next, res); dfs(board, i, j - 1, next, res);\n    board[i][j] = c;\n}\nvector<string> findWords(vector<vector<char>>& board, vector<string>& words) {\n    TrieNode* root = new TrieNode();\n    for (auto& w : words) addWord(root, w);\n    vector<string> res;\n    for (int i = 0; i < board.size(); i++)\n        for (int j = 0; j < board[0].size(); j++)\n            dfs(board, i, j, root, res);\n    return res;\n}\n// Trie + DFS Backtracking - Time: O(m*n*4^L)  Space: O(sum of word lengths)", "explanation": "Build one Trie from all target words, then DFS from every board cell walking the Trie alongside the grid; this shares prefix work across words and prunes a whole branch as soon as no word matches the path so far, instead of searching for each word independently.", "example": {"input": "board = [[\\\"o\\\",\\\"a\\\",\\\"a\\\",\\\"n\\\"],[\\\"e\\\",\\\"t\\\",\\\"a\\\",\\\"e\\\"],[\\\"i\\\",\\\"h\\\",\\\"k\\\",\\\"r\\\"],[\\\"i\\\",\\\"f\\\",\\\"l\\\",\\\"v\\\"]], words = [\\\"oath\\\",\\\"pea\\\",\\\"eat\\\",\\\"rain\\\"]", "output": "[\\\"eat\\\",\\\"oath\\\"]"}}, {"category": "Cyclic Sort", "title": "Missing Number", "difficulty": "Easy", "code": "int missingNumber(vector<int>& nums) {\n    int n = nums.size();\n    int i = 0;\n    while (i < n) {\n        int correct = nums[i];\n        if (correct < n && nums[i] != nums[correct]) swap(nums[i], nums[correct]);\n        else i++;\n    }\n    for (i = 0; i < n; i++) if (nums[i] != i) return i;\n    return n;\n}\n// Cyclic Sort - Time: O(n)  Space: O(1)", "explanation": "Cyclic sort places each value at its own index in place by repeatedly swapping until every valid number sits where it belongs; the first index that ends up mismatched (or n if none do) is the missing number.", "example": {"input": "nums = [3,0,1]", "output": "2"}}, {"category": "Cyclic Sort", "title": "Find All Duplicates in an Array", "difficulty": "Medium", "code": "vector<int> findDuplicates(vector<int>& nums) {\n    vector<int> res;\n    for (int i = 0; i < nums.size(); i++) {\n        int idx = abs(nums[i]) - 1;\n        if (nums[idx] < 0) res.push_back(idx + 1);\n        else nums[idx] = -nums[idx];\n    }\n    return res;\n}\n// Index Marking - Time: O(n)  Space: O(1) extra", "explanation": "Use each value as an index into the array itself and negate the entry found there; the second time a value's target index is visited it's already negative, revealing a duplicate.", "example": {"input": "nums = [4,3,2,7,8,2,3,1]", "output": "[2,3]"}}, {"category": "Cyclic Sort", "title": "First Missing Positive", "difficulty": "Hard", "code": "int firstMissingPositive(vector<int>& nums) {\n    int n = nums.size();\n    for (int i = 0; i < n; i++) {\n        while (nums[i] > 0 && nums[i] <= n && nums[nums[i] - 1] != nums[i]) {\n            swap(nums[i], nums[nums[i] - 1]);\n        }\n    }\n    for (int i = 0; i < n; i++) if (nums[i] != i + 1) return i + 1;\n    return n + 1;\n}\n// Cyclic Sort - Time: O(n)  Space: O(1)", "explanation": "Cyclic sort places every value v (1 <= v <= n) at index v-1 via swapping; scanning afterward for the first index whose value doesn't match its position reveals the smallest missing positive integer.", "example": {"input": "nums = [3,4,-1,1]", "output": "2"}}, {"category":"Math","title":"Prime Numbers","difficulty":"Easy","code":"bool isPrime(int n) {\n    if (n < 2) return false;\n\n    for (int i = 2; i * i <= n; i++) {\n        if (n % i == 0) {\n            return false;\n        }\n    }\n    return true;\n}\n\nvector<int> Prime(int num) {\n    vector<int> ans;\n\n    for (int i = 2; i <= num; i++) {\n        if (isPrime(i)) {\n            ans.push_back(i);\n        }\n    }\n\n    return ans;\n}\n// Trial Division - Time: O(n * sqrt(n))  Space: O(1) extra","explanation":"Check divisibility only up to the square root of each number, because any larger factor would pair with a smaller one already tested. Use that helper while scanning from 2 to num to collect all prime values.","example":{"input":"num = 10","output":"[2,3,5,7]"}}, {"category":"Math","title":"Integer to Roman","difficulty":"Medium","code":"string intToRoman(int num) {\n    vector<pair<int, string>> value = {\n        {1000, \"M\"}, {900, \"CM\"}, {500, \"D\"}, {400, \"CD\"},\n        {100, \"C\"}, {90, \"XC\"}, {50, \"L\"}, {40, \"XL\"},\n        {10, \"X\"}, {9, \"IX\"}, {5, \"V\"}, {4, \"IV\"}, {1, \"I\"}\n    };\n\n    string ans = \"\";\n\n    for (auto it : value) {\n        while (num >= it.first) {\n            ans += it.second;\n            num -= it.first;\n        }\n    }\n\n    return ans;\n}\n// Greedy - Time: O(1)  Space: O(1)","explanation":"Store Roman symbols from largest to smallest, including subtractive cases like 900 and 4. Repeatedly append the largest symbol that still fits and subtract its value until the number becomes zero.","example":{"input":"num = 1994","output":"\"MCMXCIV\""}}, {"category": "Bit Manipulation", "title": "Single Number", "difficulty": "Easy", "code": "int singleNumber(vector<int>& nums) {\n    int result = 0;\n    for (int n : nums) result ^= n;\n    return result;\n}\n// XOR - Time: O(n)  Space: O(1)", "explanation": "XOR is its own inverse and commutative, so XOR-ing every number together cancels all pairs, leaving only the number that appears once.", "example": {"input": "nums = [4,1,2,1,2]", "output": "4"}}, {"category": "Bit Manipulation", "title": "Number of 1 Bits", "difficulty": "Easy", "code": "int hammingWeight(uint32_t n) {\n    int count = 0;\n    while (n) {\n        n &= (n - 1);\n        count++;\n    }\n    return count;\n}\n// Brian Kernighan's Algorithm - Time: O(k) where k = set bits  Space: O(1)", "explanation": "Brian Kernighan's trick: n and (n-1) clears the lowest set bit each iteration, so the loop runs exactly once per 1-bit in n.", "example": {"input": "n = 00000000000000000000000000001011", "output": "3"}}, {"category": "Bit Manipulation", "title": "Counting Bits", "difficulty": "Easy", "code": "vector<int> countBits(int n) {\n    vector<int> dp(n + 1, 0);\n    for (int i = 1; i <= n; i++) dp[i] = dp[i >> 1] + (i & 1);\n    return dp;\n}\n// DP + Bit Trick - Time: O(n)  Space: O(n)", "explanation": "dp[i] reuses dp[i>>1], the popcount of i with its lowest bit removed, plus 1 if that lowest bit was set, turning the whole table into an O(n) DP instead of counting bits from scratch for every number.", "example": {"input": "n = 5", "output": "[0,1,1,2,1,2]"}}, {"category": "Bit Manipulation", "title": "Sum of Two Integers", "difficulty": "Medium", "code": "int getSum(int a, int b) {\n    while (b != 0) {\n        int carry = (unsigned int)(a & b) << 1;\n        a = a ^ b;\n        b = carry;\n    }\n    return a;\n}\n// Bitwise Add - Time: O(1) (bounded by int width)  Space: O(1)", "explanation": "XOR adds bits without carrying, while AND-then-shift computes exactly the carry bits; repeating this until there's no carry left simulates addition using only bitwise operations.", "example": {"input": "a = 2, b = 3", "output": "5"}}, {"category": "Greedy", "title": "Jump Game", "difficulty": "Medium", "code": "bool canJump(vector<int>& nums) {\n    int reach = 0;\n    for (int i = 0; i < nums.size(); i++) {\n        if (i > reach) return false;\n        reach = max(reach, i + nums[i]);\n    }\n    return true;\n}\n// Greedy - Time: O(n)  Space: O(1)", "explanation": "Greedily track the farthest index reachable so far while scanning left to right; if the current index is ever beyond that reach, the end is unreachable.", "example": {"input": "nums = [2,3,1,1,4]", "output": "true"}}, {"category": "Greedy", "title": "Gas Station", "difficulty": "Medium", "code": "int canCompleteCircuit(vector<int>& gas, vector<int>& cost) {\n    int total = 0, tank = 0, start = 0;\n    for (int i = 0; i < gas.size(); i++) {\n        int diff = gas[i] - cost[i];\n        total += diff;\n        tank += diff;\n        if (tank < 0) { start = i + 1; tank = 0; }\n    }\n    return total >= 0 ? start : -1;\n}\n// Greedy - Time: O(n)  Space: O(1)", "explanation": "Greedily reset the candidate starting station whenever the running tank goes negative, since no station before that point could have reached this far either; the route is feasible overall only if the total gas covers total cost.", "example": {"input": "gas = [1,2,3,4,5], cost = [3,4,5,1,2]", "output": "3"}}, {"category": "Graphs", "title": "Course Schedule II", "difficulty": "Medium", "code": "vector<int> findOrder(int numCourses, vector<vector<int>>& prerequisites) {\n    vector<vector<int>> graph(numCourses);\n    vector<int> indegree(numCourses, 0);\n    for (auto& p : prerequisites) {\n        graph[p[1]].push_back(p[0]);\n        indegree[p[0]]++;\n    }\n    queue<int> q;\n    for (int i = 0; i < numCourses; i++) if (indegree[i] == 0) q.push(i);\n\n    vector<int> order;\n    while (!q.empty()) {\n        int course = q.front(); q.pop();\n        order.push_back(course);\n        for (int next : graph[course])\n            if (--indegree[next] == 0) q.push(next);\n    }\n    return order.size() == numCourses ? order : vector<int>{};\n}\n// Topological Sort (Kahn's) - Time: O(V + E)  Space: O(V + E)", "explanation": "Same Kahn's algorithm as Course Schedule, but this time the BFS processing order itself is the answer, a valid course sequence, and an empty result signals a cycle.", "example": {"input": "numCourses = 4, prerequisites = [[1,0],[2,0],[3,1],[3,2]]", "output": "[0,1,2,3] (one valid order)"}}];

const PATTERN_INFO = {"Arrays": "Not one single trick but a family of array-native techniques — prefix/suffix products, running min/max tracking, in-place index rewriting (Boyer-Moore voting, cyclic overwrite). Reach for these when you need O(n) or O(n log n) and can exploit direct index access instead of an extra data structure.", "Strings": "Character-level techniques layered on top of array patterns — frequency counting with fixed-size arrays/hash maps, two-pointer scanning, and sliding windows applied to text. Used whenever the problem hinges on character comparisons, anagrams, or substring structure.", "Sliding Window": "Maintain a contiguous window over the array/string; expand the right edge to grow it and contract the left edge when a constraint is violated. Used for subarray/substring problems with a size or validity condition, turning an O(n^2) brute force into a single O(n) pass.", "Two Pointer": "Two indices move through a sorted or symmetric structure — from opposite ends inward, or both forward at different speeds. Used to avoid nested loops in pair/triplet-sum problems, partitioning, and comparisons from both ends of a sequence.", "Linked List": "Pointer-rewiring techniques on singly/doubly linked structures — dummy head nodes to simplify edge cases, fast/slow pointers for cycle or midpoint detection, and iterative reversal by tracking prev/next. Used to restructure or traverse a list in O(1) extra space.", "Stack & Queue": "LIFO/FIFO structures for state that resolves in reverse order (bracket matching, RPN evaluation) or that must stay monotonic (next-greater-element, sliding window max). Used whenever you need O(1) access to the most recent or most extreme unresolved item.", "Trees": "Recursive divide-and-conquer traversal (DFS: preorder/inorder/postorder) or queue-driven level-by-level traversal (BFS). Used any time a problem on the whole tree decomposes cleanly into the same problem on its left and right subtrees.", "Binary Search": "Repeatedly halve a monotonic search space by testing the midpoint against a condition. Used not only on sorted arrays but on any 'answer space' where a yes/no predicate is monotonic — binary searching directly on the answer rather than an index.", "Heap / Priority Queue": "A binary heap keeps the current min or max accessible in O(1) with O(log n) insert/remove. Used for top-K problems, merging multiple sorted sequences, running medians, and greedy scheduling where you repeatedly need the current best or worst element.", "Graphs": "Traversal (BFS/DFS) over nodes and edges, extended with topological sort, multi-source BFS, and shortest-path algorithms like Dijkstra. Used for connectivity, ordering, and reachability questions on structures that aren't strictly hierarchical.", "Dynamic Programming": "Break a problem into overlapping subproblems, solve each exactly once, and reuse the result via memoization or a bottom-up table. Used when brute-force recursion keeps recomputing the same state and the problem has optimal substructure.", "Backtracking": "Incrementally build a candidate solution and abandon a branch the moment it can't possibly succeed. Used to enumerate all valid combinations, permutations, or placements, where early pruning avoids exploring the full search space.", "DP Concepts": "Foundational DP recurrences — knapsack variants, LCS, Catalan numbers — taught as reusable templates rather than tied to one specific problem. Used as building blocks you should recognize embedded inside more complex, disguised DP problems.", "Sorting Algorithms": "Classic comparison-based sorting via divide-and-conquer (merge sort) or partitioning around a pivot (quick sort). Less an interview 'pattern' and more a fundamental building block worth being able to implement correctly from memory.", "Union Find": "A disjoint-set data structure with path compression and union by rank tracks which elements belong to the same group. Used for dynamic connectivity questions — merging sets and answering 'are these two connected?' in near-O(1) amortized time.", "Trie": "A prefix tree where every root-to-node path spells out a string prefix. Used for prefix-based lookups — autocomplete, dictionary word search — where a hash set would otherwise require repeatedly re-hashing overlapping substrings.", "Cyclic Sort": "Place each number directly at its 'correct' index (value == index) by swapping, exploiting that values are known to fall in a fixed range like [1..n]. Used to find missing or duplicate numbers in O(n) time and O(1) space without sorting or a hash set.", "Bit Manipulation": "Manipulate individual bits directly with XOR/AND/OR/shifts. Used for parity and set-membership problems, or to simulate arithmetic without built-in operators — often reaching O(1) space where a hash set would need O(n).", "Greedy": "At each step, make the locally optimal choice without revisiting past decisions, trusting that a sequence of locally optimal choices yields a globally optimal result. Used when the problem provably has the greedy-choice property — worth sanity-checking with a small example before trusting it."};

// simple syntax highlighter for C++
function highlight(code) {
  const escape = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = escape(code).split('\n');
  const keywords = /\b(class|public|private|protected|struct|return|if|else|while|for|do|break|continue|switch|case|default|new|delete|nullptr|true|false|void|const|static|virtual|template|typename|using|namespace|auto|this|try|catch|throw)\b/g;
  const types = /\b(int|long|double|float|char|bool|string|vector|unordered_map|unordered_set|map|set|pair|queue|priority_queue|stack|deque|list|size_t|ListNode|TreeNode|Node|MyQueue|MinStack|LRUCache|MedianFinder|Codec)\b/g;
  const nums = /\b(\d+\.?\d*)\b/g;

  return lines.map(line => {
    // protect strings & comments first
    let result = '';
    let i = 0;
    while (i < line.length) {
      if (line[i] === '/' && line[i+1] === '/') {
        result += '<span class="tok-com">' + line.slice(i) + '</span>';
        break;
      } else if (line[i] === '"') {
        let j = i + 1;
        while (j < line.length && line[j] !== '"') j++;
        result += '<span class="tok-str">' + line.slice(i, j+1) + '</span>';
        i = j + 1;
      } else if (line[i] === "'") {
        let j = i + 1;
        while (j < line.length && line[j] !== "'") j++;
        result += '<span class="tok-str">' + line.slice(i, j+1) + '</span>';
        i = j + 1;
      } else {
        result += line[i];
        i++;
      }
    }
    // now apply keyword/type/number highlighting only outside spans (rough but effective since strings/comments already wrapped)
    result = result.replace(/(<span class="tok-(?:com|str)">.*?<\/span>)|(\b(?:class|public|private|protected|struct|return|if|else|while|for|do|break|continue|switch|case|default|new|delete|nullptr|true|false|void|const|static|virtual|template|typename|using|namespace|auto|this|try|catch|throw)\b)/g,
      (m, protectedPart, kw) => protectedPart ? protectedPart : '<span class="tok-kw">' + kw + '</span>');
    result = result.replace(/(<span class="tok-(?:com|str|kw)">.*?<\/span>)|(\b(?:int|long|double|float|char|bool|string|vector|unordered_map|unordered_set|map|set|pair|queue|priority_queue|stack|deque|list|size_t|ListNode|TreeNode|Node|MyQueue|MinStack|LRUCache|MedianFinder|Codec)\b)/g,
      (m, protectedPart, ty) => protectedPart ? protectedPart : '<span class="tok-type">' + ty + '</span>');
    result = result.replace(/(<span class="tok-(?:com|str|kw|type)">.*?<\/span>)|(\b\d+\.?\d*\b)/g,
      (m, protectedPart, num) => protectedPart ? protectedPart : '<span class="tok-num">' + num + '</span>');
    return result;
  }).join('\n');
}

function slug(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g,'');
}

        });
      };
      const pre = document.createElement('pre');
      const codeEl = document.createElement('code');
      codeEl.innerHTML = highlight(p.code);
      pre.appendChild(codeEl);
      codeWrap.appendChild(copyBtn);
      codeWrap.appendChild(pre);
      codePane.appendChild(codeWrap);
      inner.appendChild(codePane);

      // explain pane
      const explainPane = document.createElement('div');
      explainPane.className = 'p-pane';
      explainPane.id = 'explain-' + uid;
      const explainBox = document.createElement('div');
      explainBox.className = 'explain-box';
      explainBox.textContent = p.explanation || 'No explanation available yet.';
      explainPane.appendChild(explainBox);
      inner.appendChild(explainPane);

      // pattern pane
      const patternPane = document.createElement('div');
      patternPane.className = 'p-pane';
      patternPane.id = 'pattern-' + uid;
      const patternBox = document.createElement('div');
      patternBox.className = 'explain-box';
      const patternLabel = document.createElement('div');
      patternLabel.className = 'pattern-label';
      patternLabel.textContent = p.category;
      patternBox.appendChild(patternLabel);
      const patternText = document.createElement('div');
      patternText.textContent = PATTERN_INFO[p.category] || 'No pattern description available yet.';
      patternBox.appendChild(patternText);
      patternPane.appendChild(patternBox);
      inner.appendChild(patternPane);

      // example pane
      const examplePane = document.createElement('div');
      examplePane.className = 'p-pane';
      examplePane.id = 'example-' + uid;
      const exampleBox = document.createElement('div');
      exampleBox.className = 'example-box';
      if (p.example) {
        const inLine = document.createElement('div');
        inLine.className = 'io-line';
        inLine.innerHTML = '<span class="io-label">Input:</span><span class="io-val">' + p.example.input + '</span>';
        const outLine = document.createElement('div');
        outLine.className = 'io-line';
        outLine.innerHTML = '<span class="io-label">Output:</span><span class="io-val">' + p.example.output + '</span>';
        exampleBox.appendChild(inLine);
        exampleBox.appendChild(outLine);
      } else {
        exampleBox.textContent = 'No example available yet.';
      }
      examplePane.appendChild(exampleBox);
      inner.appendChild(examplePane);

      // tab switching
      tabs.addEventListener('click', (e) => {
        const btn = e.target.closest('.p-tab');
        if (!btn) return;
        e.stopPropagation();
        tabs.querySelectorAll('.p-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        inner.querySelectorAll('.p-pane').forEach(pane => pane.classList.remove('active'));
        document.getElementById(btn.dataset.pane).classList.add('active');
      });

      body.appendChild(inner);

      head2.addEventListener('click', () => {
        card.classList.toggle('open');
      });

      card.appendChild(head2);
      card.appendChild(body);
      block.appendChild(card);
    });

    content.appendChild(block);
  });

  visibleCount.textContent = totalVisible;
  emptyState.classList.toggle('show', totalVisible === 0);
}

function renderCatNav() {
  catNav.innerHTML = '';
  CATEGORY_ORDER.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'cat-chip';
    chip.textContent = cat;
    chip.onclick = () => {
      const el = document.getElementById('cat-' + slug(cat));
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    catNav.appendChild(chip);
  });
}

searchInput.addEventListener('input', (e) => {
  searchTerm = e.target.value;
  render();
});

diffFilter.addEventListener('click', (e) => {
  const btn = e.target.closest('.diff-btn');
  if (!btn) return;
  diffFilter.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeDiff = btn.dataset.d;
  render();
});

totalCount.textContent = PROBLEMS.length;
renderCatNav();
render();
</script>
</body>
</html>
