<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Interview Vault</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #11161d;
    --panel-hover: #161c25;
    --border: #232b36;
    --text: #d5dbe3;
    --text-dim: #7c8794;
    --accent: #5fd9a4;
    --accent-dim: #2b6f52;
    --easy: #5fd9a4;
    --medium: #e8b95f;
    --hard: #e8695f;
    --mono: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  body { overflow-x: hidden; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px 80px; }

  .hero {
    display: flex; align-items: baseline; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 18px; margin-bottom: 20px;
  }
  .hero-title { font-family: var(--mono); font-size: 22px; font-weight: 700; letter-spacing: 0; color: #fff; }
  .hero-title span { color: var(--accent); }
  .hero-sub { font-size: 12.5px; color: var(--text-dim); font-family: var(--mono); }
  .counter { font-family: var(--mono); font-size: 12px; color: var(--text-dim); background: var(--panel); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; }
  .counter b { color: var(--accent); }

  .controls {
    position: sticky; top: 0; z-index: 20;
    background: rgba(13,17,23,0.92); backdrop-filter: blur(8px);
    padding: 14px 0 12px; margin-bottom: 6px;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    border-bottom: 1px solid transparent;
  }
  .search-box {
    flex: 1 1 260px; position: relative;
  }
  .search-box input {
    width: 100%; background: var(--panel); border: 1px solid var(--border);
    color: var(--text); font-family: var(--sans); font-size: 14px;
    padding: 10px 14px 10px 34px; border-radius: 8px; outline: none;
    transition: border-color .15s;
  }
  .search-box input:focus { border-color: var(--accent-dim); }
  .search-box::before {
    content: "⌕"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); font-size: 16px; pointer-events: none;
  }
  .diff-filter { display: flex; gap: 6px; }
  .diff-btn {
    font-family: var(--mono); font-size: 11.5px; padding: 8px 12px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--panel); color: var(--text-dim);
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .diff-btn:hover { color: var(--text); border-color: #3a4552; }
  .diff-btn.active[data-d="All"] { background: #232b36; color: #fff; border-color: #3a4552; }
  .diff-btn.active[data-d="Easy"] { background: rgba(95,217,164,0.14); color: var(--easy); border-color: var(--easy); }
  .diff-btn.active[data-d="Medium"] { background: rgba(232,185,95,0.14); color: var(--medium); border-color: var(--medium); }
  .diff-btn.active[data-d="Hard"] { background: rgba(232,105,95,0.14); color: var(--hard); border-color: var(--hard); }

  .cat-nav {
    display: flex; gap: 6px; overflow-x: auto; padding: 10px 0 18px;
    scrollbar-width: none;
  }
  .cat-nav::-webkit-scrollbar { display: none; }
  .cat-chip {
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    background: var(--panel); border: 1px solid var(--border); padding: 6px 11px;
    border-radius: 6px; white-space: nowrap; cursor: pointer; transition: all .15s;
  }
  .cat-chip:hover { color: var(--text); border-color: #3a4552; }

  .category-block { margin-top: 30px; }
  .category-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .category-head h2 {
    font-size: 14px; font-family: var(--mono); color: #fff; margin: 0;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .category-head .line { flex: 1; height: 1px; background: var(--border); }
  .category-head .cnt { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }

  .problem {
    border: 1px solid var(--border); background: var(--panel);
    border-radius: 9px; margin-bottom: 8px; overflow: hidden;
    transition: border-color .15s;
  }
  .problem:hover { border-color: #333d4a; }
  .problem.open { border-color: var(--accent-dim); }

  .p-head {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px; cursor: pointer; user-select: none;
  }
  .p-head:hover { background: var(--panel-hover); }
  .p-chevron {
    font-family: var(--mono); color: var(--text-dim); font-size: 12px;
    transition: transform .18s; flex-shrink: 0; width: 12px;
  }
  .problem.open .p-chevron { transform: rotate(90deg); color: var(--accent); }
  .p-title { flex: 1; font-size: 14.5px; font-weight: 500; color: var(--text); }
  .problem.open .p-title { color: #fff; }
  .p-badge {
    font-family: var(--mono); font-size: 10.5px; padding: 3px 9px; border-radius: 20px;
    border: 1px solid; flex-shrink: 0;
  }
  .p-badge.Easy { color: var(--easy); border-color: var(--accent-dim); background: rgba(95,217,164,0.08); }
  .p-badge.Medium { color: var(--medium); border-color: #6f5a2b; background: rgba(232,185,95,0.08); }
  .p-badge.Hard { color: var(--hard); border-color: #6f342b; background: rgba(232,105,95,0.08); }

  .p-body { max-height: 0; overflow: hidden; transition: max-height .25s ease; }
  .problem.open .p-body { max-height: 3000px; transition: max-height .4s ease; }
  .p-body-inner { padding: 0 16px 16px; }

  .p-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
  .p-tab {
    font-family: var(--mono); font-size: 11px; padding: 6px 12px; border-radius: 6px;
    border: 1px solid var(--border); background: #0f141a; color: var(--text-dim);
    cursor: pointer; transition: all .15s;
  }
  .p-tab:hover { color: var(--text); border-color: #3a4552; }
  .p-tab.active { background: rgba(95,217,164,0.12); color: var(--accent); border-color: var(--accent-dim); }

  .p-pane { display: none; }
  .p-pane.active { display: block; }

  .explain-box {
    background: #0f141a; border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px; font-size: 13.5px; line-height: 1.65; color: var(--text);
  }
  .pattern-label {
    font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
  }
  .example-box {
    background: #0f141a; border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px; font-size: 13px; line-height: 1.8;
  }
  .example-box .io-line { display: flex; gap: 8px; font-family: var(--mono); }
  .example-box .io-label {
    color: var(--accent); font-weight: 600; flex-shrink: 0; min-width: 54px;
  }
  .example-box .io-val { color: var(--text); word-break: break-word; }

  .code-wrap { position: relative; }
  .copy-btn {
    position: absolute; top: 8px; right: 8px; font-family: var(--mono); font-size: 10.5px;
    background: #1a2129; border: 1px solid var(--border); color: var(--text-dim);
    padding: 5px 9px; border-radius: 6px; cursor: pointer; transition: all .15s;
    z-index: 2;
  }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent-dim); }
  pre {
    margin: 0; background: #090c10; border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; overflow-x: auto; font-family: var(--mono); font-size: 12.5px;
    line-height: 1.6; color: #c3cad4;
  }
  code { font-family: var(--mono); }

  .tok-kw { color: #ff7b9c; }
  .tok-type { color: #7ec8e3; }
  .tok-str { color: #b9d97e; }
  .tok-com { color: #5c6773; font-style: italic; }
  .tok-num { color: #f0b56d; }
  .tok-func { color: #d9c97a; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-dim);
    font-family: var(--mono); font-size: 13px; display: none;
  }
  .empty-state.show { display: block; }

  ::selection { background: rgba(95,217,164,0.3); }

  @media (max-width: 700px) {
    .wrap {
      width: 100%;
      padding: 18px 12px 56px;
    }

    .hero {
      align-items: flex-start;
      gap: 12px;
      padding-bottom: 14px;
      margin-bottom: 10px;
    }
    .hero-title { font-size: 18px; }
    .hero-sub {
      font-size: 11.5px;
      margin-top: 4px;
    }
    .counter {
      width: 100%;
      border-radius: 8px;
      padding: 7px 10px;
    }

    .controls {
      top: 0;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding: 10px 0;
    }
    .search-box { flex-basis: auto; width: 100%; }
    .search-box input {
      min-height: 44px;
      font-size: 16px;
      padding-right: 12px;
      text-overflow: ellipsis;
    }
    .diff-filter {
      width: 100%;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .diff-filter::-webkit-scrollbar { display: none; }
    .diff-btn {
      min-height: 40px;
      flex: 1 0 auto;
      padding: 8px 10px;
    }

    .cat-nav {
      margin: 0 -12px;
      padding: 8px 12px 14px;
      scroll-padding-inline: 12px;
    }
    .cat-chip {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
    }

    .category-block { margin-top: 22px; }
    .category-head {
      gap: 8px;
      align-items: flex-start;
    }
    .category-head h2 {
      max-width: 72vw;
      font-size: 12.5px;
      line-height: 1.35;
    }

    .problem { border-radius: 8px; }
    .p-head {
      align-items: flex-start;
      gap: 9px;
      padding: 12px;
    }
    .p-title {
      min-width: 0;
      font-size: 13.5px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }
    .p-badge {
      margin-top: 1px;
      padding: 3px 7px;
      font-size: 10px;
    }
    .p-body-inner { padding: 0 12px 12px; }

    .p-tabs {
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .p-tabs::-webkit-scrollbar { display: none; }
    .p-tab {
      min-height: 38px;
      flex: 0 0 auto;
      padding: 7px 10px;
      white-space: nowrap;
    }

    .explain-box,
    .example-box {
      padding: 12px;
      font-size: 13px;
      line-height: 1.6;
    }
    .example-box .io-line {
      display: block;
      margin-bottom: 8px;
    }
    .example-box .io-line:last-child { margin-bottom: 0; }
    .example-box .io-label {
      display: block;
      min-width: 0;
      margin-bottom: 2px;
    }

    .copy-btn {
      top: 7px;
      right: 7px;
      min-height: 32px;
    }
    pre {
      max-width: 100%;
      padding: 46px 12px 14px;
      font-size: 11.5px;
      line-height: 1.55;
      -webkit-overflow-scrolling: touch;
    }
  }

  @media (max-width: 380px) {
    .wrap { padding-inline: 10px; }
    .cat-nav {
      margin-inline: -10px;
      padding-inline: 10px;
      scroll-padding-inline: 10px;
    }
    .hero-title { font-size: 16px; }
    .diff-btn { font-size: 10.5px; }
    .p-head {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr);
      gap: 7px 9px;
    }
    .p-badge {
      grid-column: 2;
      justify-self: start;
      margin-top: -2px;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div>
      <div class="hero-title">&lt;<span>DSA</span>_Vault /&gt;</div>
      <div class="hero-sub">C++ solutions · technical interview prep</div>
    </div>
    <div class="counter"><b id="visibleCount">0</b> / <span id="totalCount">0</span> problems</div>
  </div>

  <div class="controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search a problem (e.g. &quot;two sum&quot;, &quot;knapsack&quot;, &quot;lru&quot;)..." autocomplete="off">
    </div>
    <div class="diff-filter" id="diffFilter">
      <button class="diff-btn active" data-d="All">All</button>
      <button class="diff-btn" data-d="Easy">Easy</button>
      <button class="diff-btn" data-d="Medium">Medium</button>
      <button class="diff-btn" data-d="Hard">Hard</button>
    </div>
  </div>

  <div class="cat-nav" id="catNav"></div>

  <div id="content"></div>
  <div class="empty-state" id="emptyState">no problems match your filters ¯\_(ツ)_/¯</div>

</div>

<script>
const PROBLEMS = [{"category": "Arrays", "title": "Two Sum", "difficulty": "Easy", "code": "vector<int> twoSum(vector<int>& nums, int target) {\n    unordered_map<int,int> mp; // value -> index\n    for (int i = 0; i < nums.size(); i++) {\n        int need = target - nums[i];\n        if (mp.count(need)) return {mp[need], i};\n        mp[nums[i]] = i;\n    }\n    return {};\n}\n// Time: O(n)  Space: O(n)", "explanation": "Use a hash map to store each number's index while scanning once; for each element check if its complement (target minus the number) was already seen, giving an O(n) one-pass solution instead of the O(n^2) brute force.", "example": {"input": "nums = [2,7,11,15], target = 9", "output": "[0,1]"}}, {"category": "Arrays", "title": "Best Time to Buy and Sell Stock", "difficulty": "Easy", "code": "int maxProfit(vector<int>& prices) {\n    int minPrice = INT_MAX, best = 0;\n    for (int p : prices) {\n        minPrice = min(minPrice, p);\n        best = max(best, p - minPrice);\n    }\n    return best;\n}\n// Time: O(n)  Space: O(1)", "explanation": "Track the minimum price seen so far while scanning left to right, and at each step compute the profit if sold today; keep the maximum profit found.", "example": {"input": "prices = [7,1,5,3,6,4]", "output": "5"}}, {"category": "Arrays", "title": "Product of Array Except Self", "difficulty": "Medium", "code": "vector<int> productExceptSelf(vector<int>& nums) {\n    int n = nums.size();\n    vector<int> res(n, 1);\n    int prefix = 1;\n    for (int i = 0; i < n; i++) {\n        res[i] = prefix;\n        prefix *= nums[i];\n    }\n    int suffix = 1;\n    for (int i = n - 1; i >= 0; i--) {\n        res[i] *= suffix;\n        suffix *= nums[i];\n    }\n    return res;\n}\n// Time: O(n)  Space: O(1) extra (excluding output)", "explanation": "Compute prefix products (product of all elements to the left) in one pass, then multiply by suffix products (product of all elements to the right) in a second pass, avoiding division entirely.", "example": {"input": "nums = [1,2,3,4]", "output": "[24,12,8,6]"}}, {"category": "Arrays", "title": "Maximum Subarray", "difficulty": "Medium", "code": "int maxSubArray(vector<int>& nums) {\n    int best = nums[0], cur = nums[0];\n    for (int i = 1; i < nums.size(); i++) {\n        cur = max(nums[i], cur + nums[i]);\n        best = max(best, cur);\n    }\n    return best;\n}\n// Kadane's Algorithm - Time: O(n)  Space: O(1)", "explanation": "Kadane's algorithm: at each index decide whether to extend the current subarray or start fresh from the current element, tracking the best sum seen so far.", "example": {"input": "nums = [-2,1,-3,4,-1,2,1,-5,4]", "output": "6"}}, {"category": "Arrays", "title": "Merge Intervals", "difficulty": "Medium", "code": "vector<vector<int>> merge(vector<vector<int>>& intervals) {\n    sort(intervals.begin(), intervals.end());\n    vector<vector<int>> res;\n    for (auto& iv : intervals) {\n        if (!res.empty() && iv[0] <= res.back()[1])\n            res.back()[1] = max(res.back()[1], iv[1]);\n        else\n            res.push_back(iv);\n    }\n    return res;\n}\n// Time: O(n log n)  Space: O(n)", "explanation": "Sort intervals by start time, then sweep through and merge the current interval into the last one in the result whenever they overlap.", "example": {"input": "intervals = [[1,3],[2,6],[8,10],[15,18]]", "output": "[[1,6],[8,10],[15,18]]"}}, {"category": "Arrays", "title": "Rotate Array", "difficulty": "Medium", "code": "void reverse(vector<int>& nums, int l, int r) {\n    while (l < r) swap(nums[l++], nums[r--]);\n}\nvoid rotate(vector<int>& nums, int k) {\n    int n = nums.size();\n    k %= n;\n    reverse(nums, 0, n - 1);\n    reverse(nums, 0, k - 1);\n    reverse(nums, k, n - 1);\n}\n// Time: O(n)  Space: O(1)", "explanation": "Reverse the whole array, then reverse the first k elements and the remaining n-k elements separately — three reversals produce an in-place rotation.", "example": {"input": "nums = [1,2,3,4,5,6,7], k = 3", "output": "[5,6,7,1,2,3,4]"}}, {"category": "Arrays", "title": "Set Matrix Zeroes", "difficulty": "Medium", "code": "void setZeroes(vector<vector<int>>& matrix) {\n    int m = matrix.size(), n = matrix[0].size();\n    bool firstRow = false, firstCol = false;\n    for (int j = 0; j < n; j++) if (matrix[0][j] == 0) firstRow = true;\n    for (int i = 0; i < m; i++) if (matrix[i][0] == 0) firstCol = true;\n\n    for (int i = 1; i < m; i++)\n        for (int j = 1; j < n; j++)\n            if (matrix[i][j] == 0) { matrix[i][0] = 0; matrix[0][j] = 0; }\n\n    for (int i = 1; i < m; i++)\n        for (int j = 1; j < n; j++)\n            if (matrix[i][0] == 0 || matrix[0][j] == 0) matrix[i][j] = 0;\n\n    if (firstRow) for (int j = 0; j < n; j++) matrix[0][j] = 0;\n    if (firstCol) for (int i = 0; i < m; i++) matrix[i][0] = 0;\n}\n// Time: O(m*n)  Space: O(1)", "explanation": "Use the first row and column of the matrix itself as markers for which rows/columns need zeroing (tracking separately whether the first row/column originally had a zero), then apply zeros in a second pass for O(1) extra space.", "example": {"input": "matrix = [[1,1,1],[1,0,1],[1,1,1]]", "output": "[[1,0,1],[0,0,0],[1,0,1]]"}}, {"category": "Arrays", "title": "Move Zeroes", "difficulty": "Easy", "code": "void moveZeroes(vector<int>& nums) {\n    int insertPos = 0;\n    for (int num : nums) {\n        if (num != 0) nums[insertPos++] = num;\n    }\n    while (insertPos < nums.size()) nums[insertPos++] = 0;\n}\n// Time: O(n)  Space: O(1)", "explanation": "In-place technique: overwrite the array from the front with all non-zero elements in their original order, then fill whatever positions remain at the tail with zeroes.", "example": {"input": "nums = [0,1,0,3,12]", "output": "[1,3,12,0,0]"}}, {"category": "Arrays", "title": "Majority Element", "difficulty": "Easy", "code": "int majorityElement(vector<int>& nums) {\n    int count = 0, candidate = 0;\n    for (int num : nums) {\n        if (count == 0) candidate = num;\n        count += (num == candidate) ? 1 : -1;\n    }\n    return candidate;\n}\n// Boyer-Moore Voting - Time: O(n)  Space: O(1)", "explanation": "Boyer-Moore voting algorithm: maintain a candidate and a counter, incrementing on a match and decrementing otherwise, resetting the candidate whenever the counter hits zero; the element appearing more than n/2 times always survives.", "example": {"input": "nums = [2,2,1,1,1,2,2]", "output": "2"}}, {"category": "Strings", "title": "Valid Anagram", "difficulty": "Easy", "code": "bool isAnagram(string s, string t) {\n    if (s.size() != t.size()) return false;\n    int cnt[26] = {0};\n    for (char c : s) cnt[c - 'a']++;\n    for (char c : t) if (--cnt[c - 'a'] < 0) return false;\n    return true;\n}\n// Time: O(n)  Space: O(1)", "explanation": "Count character frequencies of the first string, then decrement counts while scanning the second string; if any count goes negative or lengths differ, it's not an anagram.", "example": {"input": "s = \"anagram\", t = \"nagaram\"", "output": "true"}}, {"category": "Strings", "title": "Longest Common Prefix", "difficulty": "Easy", "code": "string longestCommonPrefix(vector<string>& strs) {\n    if (strs.empty()) return \"\";\n    string prefix = strs[0];\n    for (int i = 1; i < strs.size(); i++) {\n        while (strs[i].find(prefix) != 0) {\n            prefix = prefix.substr(0, prefix.size() - 1);\n            if (prefix.empty()) return \"\";\n        }\n    }\n    return prefix;\n}\n// Time: O(n*m)  Space: O(1)", "explanation": "Start with the first string as the candidate prefix, then repeatedly shrink it until it's a prefix of every other string in the list.", "example": {"input": "strs = [\"flower\",\"flow\",\"flight\"]", "output": "\"fl\""}}, {"category": "Strings", "title": "Valid Palindrome", "difficulty": "Easy", "code": "bool isPalindrome(string s) {\n    int l = 0, r = s.size() - 1;\n    while (l < r) {\n        while (l < r && !isalnum(s[l])) l++;\n        while (l < r && !isalnum(s[r])) r--;\n        if (tolower(s[l]) != tolower(s[r])) return false;\n        l++; r--;\n    }\n    return true;\n}\n// Time: O(n)  Space: O(1)", "explanation": "Two pointers move inward from both ends, skipping non-alphanumeric characters and comparing lowercase letters until they meet.", "example": {"input": "s = \"A man, a plan, a canal: Panama\"", "output": "true"}}, {"category": "Strings", "title": "Group Anagrams", "difficulty": "Medium", "code": "vector<vector<string>> groupAnagrams(vector<string>& strs) {\n    unordered_map<string, vector<string>> mp;\n    for (string& s : strs) {\n        string key = s;\n        sort(key.begin(), key.end());\n        mp[key].push_back(s);\n    }\n    vector<vector<string>> res;\n    for (auto& [k, v] : mp) res.push_back(v);\n    return res;\n}\n// Time: O(n * k log k)  Space: O(n * k)", "explanation": "Sort the letters of each string to form a canonical key, then group all strings sharing the same key together using a hash map.", "example": {"input": "strs = [\"eat\",\"tea\",\"tan\",\"ate\",\"nat\",\"bat\"]", "output": "[[\"eat\",\"tea\",\"ate\"],[\"tan\",\"nat\"],[\"bat\"]]"}}, {"category": "Strings", "title": "Longest Substring Without Repeating Characters", "difficulty": "Medium", "code": "int lengthOfLongestSubstring(string s) {\n    unordered_map<char,int> last;\n    int best = 0, left = 0;\n    for (int right = 0; right < s.size(); right++) {\n        char c = s[right];\n        if (last.count(c) && last[c] >= left)\n            left = last[c] + 1;\n        last[c] = right;\n        best = max(best, right - left + 1);\n    }\n    return best;\n}\n// Sliding Window - Time: O(n)  Space: O(min(n, charset))", "explanation": "Sliding window with a hash map recording the last index of each character; when a repeat is found within the window, jump the left pointer just past its previous occurrence.", "example": {"input": "s = \"abcabcbb\"", "output": "3"}}, {"category": "Strings", "title": "String to Integer (atoi)", "difficulty": "Medium", "code": "int myAtoi(string s) {\n    int i = 0, n = s.size();\n    while (i < n && s[i] == ' ') i++;\n    int sign = 1;\n    if (i < n && (s[i] == '+' || s[i] == '-')) sign = (s[i++] == '-') ? -1 : 1;\n    long res = 0;\n    while (i < n && isdigit(s[i])) {\n        res = res * 10 + (s[i++] - '0');\n        if (res * sign > INT_MAX) return INT_MAX;\n        if (res * sign < INT_MIN) return INT_MIN;\n    }\n    return res * sign;\n}\n// Time: O(n)  Space: O(1)", "explanation": "Skip leading whitespace, read an optional sign, then consume digits while accumulating the number, clamping to INT_MIN/INT_MAX bounds as soon as they're exceeded.", "example": {"input": "s = \"   -42\"", "output": "-42"}}, {"category": "Strings", "title": "Minimum Window Substring", "difficulty": "Hard", "code": "string minWindow(string s, string t) {\n    if (t.empty()) return \"\";\n    unordered_map<char,int> need, window;\n    for (char c : t) need[c]++;\n    int required = need.size(), formed = 0;\n    int left = 0, bestLen = INT_MAX, bestStart = 0;\n    for (int right = 0; right < s.size(); right++) {\n        char c = s[right];\n        window[c]++;\n        if (need.count(c) && window[c] == need[c]) formed++;\n        while (formed == required) {\n            if (right - left + 1 < bestLen) {\n                bestLen = right - left + 1;\n                bestStart = left;\n            }\n            char lc = s[left];\n            window[lc]--;\n            if (need.count(lc) && window[lc] < need[lc]) formed--;\n            left++;\n        }\n    }\n    return bestLen == INT_MAX ? \"\" : s.substr(bestStart, bestLen);\n}\n// Sliding Window - Time: O(n)  Space: O(k)", "explanation": "Sliding window that expands the right edge until all characters of t are covered, then contracts the left edge to shrink the window while it stays valid, recording the smallest valid window seen.", "example": {"input": "s = \"ADOBECODEBANC\", t = \"ABC\"", "output": "\"BANC\""}}, {"category": "Sliding Window", "title": "Maximum Sum Subarray of Size K", "difficulty": "Easy", "code": "int maxSumSubarraySizeK(vector<int>& nums, int k) {\n    int windowSum = 0, best = 0;\n    for (int i = 0; i < nums.size(); i++) {\n        windowSum += nums[i];\n        if (i >= k - 1) {\n            best = max(best, windowSum);\n            windowSum -= nums[i - k + 1];\n        }\n    }\n    return best;\n}\n// Fixed-size Sliding Window - Time: O(n)  Space: O(1)", "explanation": "Slide a fixed-size window of length k across the array, maintaining a running sum by adding the new right element and subtracting the element leaving on the left, tracking the max sum seen.", "example": {"input": "nums = [2,1,5,1,3,2], k = 3", "output": "9"}}, {"category": "Sliding Window", "title": "Longest Repeating Character Replacement", "difficulty": "Medium", "code": "int characterReplacement(string s, int k) {\n    unordered_map<char,int> freq;\n    int left = 0, maxFreq = 0, best = 0;\n    for (int right = 0; right < s.size(); right++) {\n        freq[s[right]]++;\n        maxFreq = max(maxFreq, freq[s[right]]);\n        while ((right - left + 1) - maxFreq > k) {\n            freq[s[left]]--;\n            left++;\n        }\n        best = max(best, right - left + 1);\n    }\n    return best;\n}\n// Sliding Window - Time: O(n)  Space: O(26)", "explanation": "Sliding window tracking the count of the most frequent character inside it; if replacing all other characters in the window would need more than k swaps, shrink from the left, otherwise expand and track the best window length.", "example": {"input": "s = \"AABABBA\", k = 1", "output": "4"}}, {"category": "Sliding Window", "title": "Permutation in String", "difficulty": "Medium", "code": "bool checkInclusion(string s1, string s2) {\n    if (s1.size() > s2.size()) return false;\n    vector<int> need(26, 0), window(26, 0);\n    for (char c : s1) need[c - 'a']++;\n    int k = s1.size();\n    for (int i = 0; i < s2.size(); i++) {\n        window[s2[i] - 'a']++;\n        if (i >= k) window[s2[i - k] - 'a']--;\n        if (i >= k - 1 && window == need) return true;\n    }\n    return false;\n}\n// Fixed-size Sliding Window - Time: O(n)  Space: O(26)", "explanation": "Slide a window the same size as s1 across s2, keeping a running character-count array for the window; whenever that count array matches s1's exactly, a permutation of s1 has been found.", "example": {"input": "s1 = \"ab\", s2 = \"eidbaooo\"", "output": "true"}}, {"category": "Two Pointer", "title": "Pair with Given Sum (Sorted Array)", "difficulty": "Easy", "code": "bool pairWithGivenSum(vector<int>& nums, int target) {\n    int l = 0, r = nums.size() - 1;\n    while (l < r) {\n        int sum = nums[l] + nums[r];\n        if (sum == target) return true;\n        else if (sum < target) l++;\n        else r--;\n    }\n    return false;\n}\n// Two Pointer - Time: O(n)  Space: O(1)", "explanation": "Since the array is sorted, start pointers at both ends: if the sum is too small move the left pointer right to increase it, if too large move the right pointer left to decrease it.", "example": {"input": "nums = [1,2,3,4,6], target = 6", "output": "true"}}, {"category": "Two Pointer", "title": "3Sum", "difficulty": "Medium", "code": "vector<vector<int>> threeSum(vector<int>& nums) {\n    sort(nums.begin(), nums.end());\n    vector<vector<int>> res;\n    int n = nums.size();\n    for (int i = 0; i < n - 2; i++) {\n        if (i > 0 && nums[i] == nums[i - 1]) continue;\n        int l = i + 1, r = n - 1;\n        while (l < r) {\n            int sum = nums[i] + nums[l] + nums[r];\n            if (sum == 0) {\n                res.push_back({nums[i], nums[l], nums[r]});\n                while (l < r && nums[l] == nums[l + 1]) l++;\n                while (l < r && nums[r] == nums[r - 1]) r--;\n                l++; r--;\n            } else if (sum < 0) l++;\n            else r--;\n        }\n    }\n    return res;\n}\n// Sort + Two Pointer - Time: O(n^2)  Space: O(1) extra", "explanation": "Sort the array, fix one element, then use two pointers on the remaining sorted range to find pairs that sum to its negation, skipping duplicate values to avoid repeated triplets.", "example": {"input": "nums = [-1,0,1,2,-1,-4]", "output": "[[-1,-1,2],[-1,0,1]]"}}, {"category": "Two Pointer", "title": "Container With Most Water", "difficulty": "Medium", "code": "int maxArea(vector<int>& height) {\n    int l = 0, r = height.size() - 1, best = 0;\n    while (l < r) {\n        int area = min(height[l], height[r]) * (r - l);\n        best = max(best, area);\n        if (height[l] < height[r]) l++;\n        else r--;\n    }\n    return best;\n}\n// Two Pointer - Time: O(n)  Space: O(1)", "explanation": "Two pointers start at both ends; the area is limited by the shorter wall, so always move the pointer at the shorter wall inward, since moving the taller one can never increase the area.", "example": {"input": "height = [1,8,6,2,5,4,8,3,7]", "output": "49"}}, {"category": "Two Pointer", "title": "Remove Duplicates from Sorted Array", "difficulty": "Easy", "code": "int removeDuplicates(vector<int>& nums) {\n    if (nums.empty()) return 0;\n    int slow = 0;\n    for (int fast = 1; fast < nums.size(); fast++) {\n        if (nums[fast] != nums[slow]) {\n            slow++;\n            nums[slow] = nums[fast];\n        }\n    }\n    return slow + 1;\n}\n// Two Pointer - Time: O(n)  Space: O(1)", "explanation": "A slow pointer marks the last unique element written; a fast pointer scans ahead, and whenever it finds a new value, slow advances and copies it in, compacting the array in place.", "example": {"input": "nums = [0,0,1,1,1,2,2,3,3,4]", "output": "5, nums becomes [0,1,2,3,4,...]"}}, {"category": "Two Pointer", "title": "Squares of a Sorted Array", "difficulty": "Easy", "code": "vector<int> sortedSquares(vector<int>& nums) {\n    int n = nums.size();\n    vector<int> res(n);\n    int l = 0, r = n - 1;\n    for (int i = n - 1; i >= 0; i--) {\n        int leftSq = nums[l] * nums[l], rightSq = nums[r] * nums[r];\n        if (leftSq > rightSq) { res[i] = leftSq; l++; }\n        else { res[i] = rightSq; r--; }\n    }\n    return res;\n}\n// Two Pointer - Time: O(n)  Space: O(n)", "explanation": "The largest squared values come from whichever end (most negative or most positive) has the larger absolute value, so fill the result from the back using two pointers converging inward.", "example": {"input": "nums = [-4,-1,0,3,10]", "output": "[0,1,9,16,100]"}}, {"category": "Two Pointer", "title": "Trapping Rain Water", "difficulty": "Hard", "code": "int trap(vector<int>& height) {\n    int l = 0, r = height.size() - 1;\n    int leftMax = 0, rightMax = 0, water = 0;\n    while (l < r) {\n        if (height[l] < height[r]) {\n            leftMax = max(leftMax, height[l]);\n            water += leftMax - height[l];\n            l++;\n        } else {\n            rightMax = max(rightMax, height[r]);\n            water += rightMax - height[r];\n            r--;\n        }\n    }\n    return water;\n}\n// Two Pointer - Time: O(n)  Space: O(1)", "explanation": "Two pointers track the max wall height seen from each side; water trapped above the shorter side's current bar equals that side's running max minus the bar's own height, since the far side is guaranteed to have an equal or taller wall.", "example": {"input": "height = [0,1,0,2,1,0,1,3,2,1,2,1]", "output": "6"}}, {"category": "Linked List", "title": "Reverse Linked List", "difficulty": "Easy", "code": "struct ListNode { int val; ListNode* next; ListNode(int x): val(x), next(nullptr) {} };\n\nListNode* reverseList(ListNode* head) {\n    ListNode* prev = nullptr;\n    while (head) {\n        ListNode* next = head->next;\n        head->next = prev;\n        prev = head;\n        head = next;\n    }\n    return prev;\n}\n// Time: O(n)  Space: O(1)", "explanation": "Iteratively walk the list while rewiring each node's next pointer to point backward to the previous node, using a temp variable so the rest of the list isn't lost.", "example": {"input": "head = [1,2,3,4,5]", "output": "[5,4,3,2,1]"}}, {"category": "Linked List", "title": "Middle of the Linked List", "difficulty": "Easy", "code": "struct ListNode { int val; ListNode* next; ListNode(int x): val(x), next(nullptr) {} };\n\nListNode* middleNode(ListNode* head) {\n    ListNode *slow = head, *fast = head;\n    while (fast && fast->next) {\n        slow = slow->next;\n        fast = fast->next->next;\n    }\n    return slow;\n}\n// Slow/Fast Pointers - Time: O(n)  Space: O(1)", "explanation": "Slow/fast pointer technique: fast moves two steps for every one step of slow, so when fast reaches the end, slow sits at the middle.", "example": {"input": "head = [1,2,3,4,5]", "output": "[3,4,5]"}}, {"category": "Linked List", "title": "Merge Two Sorted Lists", "difficulty": "Easy", "code": "struct ListNode { int val; ListNode* next; ListNode(int x): val(x), next(nullptr) {} };\n\nListNode* mergeTwoLists(ListNode* l1, ListNode* l2) {\n    ListNode dummy(0);\n    ListNode* tail = &dummy;\n    while (l1 && l2) {\n        if (l1->val <= l2->val) { tail->next = l1; l1 = l1->next; }\n        else { tail->next = l2; l2 = l2->next; }\n        tail = tail->next;\n    }\n    tail->next = l1 ? l1 : l2;\n    return dummy.next;\n}\n// Time: O(n + m)  Space: O(1)", "explanation": "Use a dummy head and a tail pointer; repeatedly attach whichever of the two current nodes has the smaller value, then attach whatever remains of the longer list.", "example": {"input": "l1 = [1,2,4], l2 = [1,3,4]", "output": "[1,1,2,3,4,4]"}}, {"category": "Linked List", "title": "Linked List Cycle", "difficulty": "Easy", "code": "struct ListNode { int val; ListNode* next; ListNode(int x): val(x), next(nullptr) {} };\n\nbool hasCycle(ListNode *head) {\n    ListNode *slow = head, *fast = head;\n    while (fast && fast->next) {\n        slow = slow->next;\n        fast = fast->next->next;\n        if (slow == fast) return true;\n    }\n    return false;\n}\n// Floyd's Cycle Detection - Time: O(n)  Space: O(1)", "explanation": "Floyd's tortoise and hare: a slow pointer and a fast pointer traverse the list; if there's a cycle they eventually meet, otherwise the fast pointer reaches null.", "example": {"input": "head = [3,2,0,-4], pos = 1 (tail connects to index 1)", "output": "true"}}, {"category": "Linked List", "title": "Remove Nth Node From End of List", "difficulty": "Medium", "code": "struct ListNode { int val; ListNode* next; ListNode(int x): val(x), next(nullptr) {} };\n\nListNode* removeNthFromEnd(ListNode* head, int n) {\n    ListNode dummy(0); dummy.next = head;\n    ListNode *fast = &dummy, *slow = &dummy;\n    for (int i = 0; i < n; i++) fast = fast->next;\n    while (fast->next) { fast = fast->next; slow = slow->next; }\n    ListNode* toDelete = slow->next;\n    slow->next = slow->next->next;\n    delete toDelete;\n    return dummy.next;\n}\n// Two Pointers - Time: O(n)  Space: O(1)", "explanation": "Advance a fast pointer n steps ahead of a slow pointer, then move both together until fast reaches the end; slow now sits just before the node to remove.", "example": {"input": "head = [1,2,3,4,5], n = 2", "output": "[1,2,3,5]"}}, {"category": "Linked List", "title": "Reorder List", "difficulty": "Medium", "code": "struct ListNode { int val; ListNode* next; ListNode(int x): val(x), next(nullptr) {} };\n\nvoid reorderList(ListNode* head) {\n    if (!head || !head->next) return;\n    // find middle\n    ListNode *slow = head, *fast = head;\n    while (fast->next && fast->next->next) { slow = slow->next; fast = fast->next->next; }\n    // reverse second half\n    ListNode* second = slow->next;\n    slow->next = nullptr;\n    ListNode* prev = nullptr;\n    while (second) {\n        ListNode* nxt = second->next;\n        second->next = prev;\n        prev = second;\n        second = nxt;\n    }\n    // merge two halves\n    ListNode *first = head, *sec = prev;\n    while (sec) {\n        ListNode* t1 = first->next;\n        ListNode* t2 = sec->next;\n        first->next = sec;\n        sec->next = t1;\n        first = t1;\n        sec = t2;\n    }\n}\n// Time: O(n)  Space: O(1)", "explanation": "Find the middle with slow/fast pointers, reverse the second half, then merge the two halves by alternately splicing nodes from the front and the reversed back half.", "example": {"input": "head = [1,2,3,4]", "output": "[1,4,2,3]"}}, {"category": "Linked List", "title": "LRU Cache", "difficulty": "Medium", "code": "class LRUCache {\n    int cap;\n    list<pair<int,int>> order; // (key, value), front = most recent\n    unordered_map<int, list<pair<int,int>>::iterator> mp;\npublic:\n    LRUCache(int capacity) : cap(capacity) {}\n\n    int get(int key) {\n        if (!mp.count(key)) return -1;\n        order.splice(order.begin(), order, mp[key]);\n        return mp[key]->second;\n    }\n\n    void put(int key, int value) {\n        if (mp.count(key)) {\n            order.erase(mp[key]);\n        } else if (order.size() == cap) {\n            int lruKey = order.back().first;\n            order.pop_back();\n            mp.erase(lruKey);\n        }\n        order.push_front({key, value});\n        mp[key] = order.begin();\n    }\n};\n// get/put - Time: O(1)  Space: O(capacity)", "explanation": "Combine a doubly linked list (tracking recency order) with a hash map (key to list iterator) so both get and put run in O(1): moving/inserting at the front marks recent use, and the back of the list is evicted when over capacity.", "example": {"input": "capacity=2; put(1,1); put(2,2); get(1); put(3,3) evicts key 2", "output": "get(1) = 1, get(2) = -1"}}, {"category": "Stack & Queue", "title": "Valid Parentheses", "difficulty": "Easy", "code": "bool isValid(string s) {\n    stack<char> st;\n    for (char c : s) {\n        if (c == '(' || c == '[' || c == '{') st.push(c);\n        else {\n            if (st.empty()) return false;\n            char top = st.top(); st.pop();\n            if ((c == ')' && top != '(') ||\n                (c == ']' && top != '[') ||\n                (c == '}' && top != '{')) return false;\n        }\n    }\n    return st.empty();\n}\n// Time: O(n)  Space: O(n)", "explanation": "Push opening brackets onto a stack; on a closing bracket, check that it matches the type on top of the stack and pop it. The string is valid only if the stack ends empty.", "example": {"input": "s = \"()[]{}\"", "output": "true"}}, {"category": "Stack & Queue", "title": "Implement Queue using Stacks", "difficulty": "Easy", "code": "class MyQueue {\n    stack<int> in, out;\npublic:\n    void push(int x) { in.push(x); }\n\n    int pop() {\n        peek();\n        int val = out.top(); out.pop();\n        return val;\n    }\n\n    int peek() {\n        if (out.empty())\n            while (!in.empty()) { out.push(in.top()); in.pop(); }\n        return out.top();\n    }\n\n    bool empty() { return in.empty() && out.empty(); }\n};\n// Amortized Time: O(1) per op  Space: O(n)", "explanation": "Keep an 'in' stack for pushes and an 'out' stack for pops; when 'out' is empty, dump all of 'in' into it, which reverses the order so the oldest element ends up on top.", "example": {"input": "push(1); push(2); peek()", "output": "1"}}, {"category": "Stack & Queue", "title": "Min Stack", "difficulty": "Medium", "code": "class MinStack {\n    stack<pair<int,int>> st; // {value, currentMin}\npublic:\n    void push(int val) {\n        int mn = st.empty() ? val : min(val, st.top().second);\n        st.push({val, mn});\n    }\n    void pop() { st.pop(); }\n    int top() { return st.top().first; }\n    int getMin() { return st.top().second; }\n};\n// All ops - Time: O(1)  Space: O(n)", "explanation": "Each stack entry stores both the pushed value and the minimum value seen so far up to that point, so getMin() is always just a peek at the top.", "example": {"input": "push(-2); push(0); push(-3); getMin()", "output": "-3"}}, {"category": "Stack & Queue", "title": "Daily Temperatures", "difficulty": "Medium", "code": "vector<int> dailyTemperatures(vector<int>& temperatures) {\n    int n = temperatures.size();\n    vector<int> res(n, 0);\n    stack<int> st; // indices, decreasing temps\n    for (int i = 0; i < n; i++) {\n        while (!st.empty() && temperatures[i] > temperatures[st.top()]) {\n            int idx = st.top(); st.pop();\n            res[idx] = i - idx;\n        }\n        st.push(i);\n    }\n    return res;\n}\n// Monotonic Stack - Time: O(n)  Space: O(n)", "explanation": "Maintain a monotonically decreasing stack of indices; whenever the current temperature exceeds the temperature at the index on top of the stack, that's the answer (days to wait) for that index.", "example": {"input": "temperatures = [73,74,75,71,69,72,76,73]", "output": "[1,1,4,2,1,1,0,0]"}}, {"category": "Stack & Queue", "title": "Next Greater Element I", "difficulty": "Easy", "code": "vector<int> nextGreaterElement(vector<int>& nums1, vector<int>& nums2) {\n    unordered_map<int,int> nextGreater;\n    stack<int> st;\n    for (int num : nums2) {\n        while (!st.empty() && st.top() < num) {\n            nextGreater[st.top()] = num;\n            st.pop();\n        }\n        st.push(num);\n    }\n    vector<int> res;\n    for (int num : nums1) res.push_back(nextGreater.count(num) ? nextGreater[num] : -1);\n    return res;\n}\n// Monotonic Stack - Time: O(n + m)  Space: O(n)", "explanation": "Compute the next-greater value for every element of nums2 with a monotonic decreasing stack, store the results in a map, then look up each element of nums1.", "example": {"input": "nums1 = [4,1,2], nums2 = [1,3,4,2]", "output": "[-1,3,-1]"}}, {"category": "Stack & Queue", "title": "Evaluate Reverse Polish Notation", "difficulty": "Medium", "code": "int evalRPN(vector<string>& tokens) {\n    stack<int> st;\n    for (string& tok : tokens) {\n        if (tok == \"+\" || tok == \"-\" || tok == \"*\" || tok == \"/\") {\n            int b = st.top(); st.pop();\n            int a = st.top(); st.pop();\n            if (tok == \"+\") st.push(a + b);\n            else if (tok == \"-\") st.push(a - b);\n            else if (tok == \"*\") st.push(a * b);\n            else st.push(a / b);\n        } else {\n            st.push(stoi(tok));\n        }\n    }\n    return st.top();\n}\n// Time: O(n)  Space: O(n)", "explanation": "Scan tokens left to right, pushing numbers onto a stack; whenever an operator appears, pop the top two numbers, apply the operator, and push the result back.", "example": {"input": "tokens = [\"2\",\"1\",\"+\",\"3\",\"*\"]", "output": "9"}}, {"category": "Stack & Queue", "title": "Sliding Window Maximum", "difficulty": "Hard", "code": "vector<int> maxSlidingWindow(vector<int>& nums, int k) {\n    deque<int> dq; // stores indices, decreasing values\n    vector<int> res;\n    for (int i = 0; i < nums.size(); i++) {\n        if (!dq.empty() && dq.front() <= i - k) dq.pop_front();\n        while (!dq.empty() && nums[dq.back()] < nums[i]) dq.pop_back();\n        dq.push_back(i);\n        if (i >= k - 1) res.push_back(nums[dq.front()]);\n    }\n    return res;\n}\n// Monotonic Deque - Time: O(n)  Space: O(k)", "explanation": "Maintain a deque of indices whose corresponding values stay in decreasing order; the front of the deque is always the max of the current window, and out-of-window or smaller indices are discarded as the window slides.", "example": {"input": "nums = [1,3,-1,-3,5,3,6,7], k = 3", "output": "[3,3,5,5,6,7]"}}, {"category": "Trees", "title": "Maximum Depth of Binary Tree", "difficulty": "Easy", "code": "struct TreeNode { int val; TreeNode* left; TreeNode* right; TreeNode(int x): val(x), left(nullptr), right(nullptr) {} };\n\nint maxDepth(TreeNode* root) {\n    if (!root) return 0;\n    return 1 + max(maxDepth(root->left), maxDepth(root->right));\n}\n// Time: O(n)  Space: O(h)", "explanation": "Recursively compute the depth of the left and right subtrees and return 1 plus the larger of the two (0 for a null node).", "example": {"input": "root = [3,9,20,null,null,15,7]", "output": "3"}}, {"category": "Trees", "title": "Same Tree", "difficulty": "Easy", "code": "struct TreeNode { int val; TreeNode* left; TreeNode* right; TreeNode(int x): val(x), left(nullptr), right(nullptr) {} };\n\nbool isSameTree(TreeNode* p, TreeNode* q) {\n    if (!p && !q) return true;\n    if (!p || !q || p->val != q->val) return false;\n    return isSameTree(p->left, q->left) && isSameTree(p->right, q->right);\n}\n// Time: O(n)  Space: O(h)", "explanation": "Recursively compare nodes: both null is equal, one null (not the other) or differing values is unequal, otherwise recurse into left and right children.", "example": {"input": "p = [1,2,3], q = [1,2,3]", "output": "true"}}, {"category": "Trees", "title": "Invert Binary Tree", "difficulty": "Easy", "code": "struct TreeNode { int val; TreeNode* left; TreeNode* right; TreeNode(int x): val(x), left(nullptr), right(nullptr) {} };\n\nTreeNode* invertTree(TreeNode* root) {\n    if (!root) return nullptr;\n    swap(root->left, root->right);\n    invertTree(root->left);\n    invertTree(root->right);\n    return root;\n}\n// Time: O(n)  Space: O(h)", "explanation": "Recursively swap the left and right children of every node in the tree, mirroring it.", "example": {"input": "root = [4,2,7,1,3,6,9]", "output": "[4,7,2,9,6,3,1]"}}, {"category": "Trees", "title": "Binary Tree Level Order Traversal", "difficulty": "Medium", "code": "struct TreeNode { int val; TreeNode* left; TreeNode* right; TreeNode(int x): val(x), left(nullptr), right(nullptr) {} };\n\nvector<vector<int>> levelOrder(TreeNode* root) {\n    vector<vector<int>> res;\n    if (!root) return res;\n    queue<TreeNode*> q;\n    q.push(root);\n    while (!q.empty()) {\n        int sz = q.size();\n        vector<int> level;\n        for (int i = 0; i < sz; i++) {\n            TreeNode* node = q.front(); q.pop();\n            level.push_back(node->val);\n            if (node->left) q.push(node->left);\n            if (node->right) q.push(node->right);\n        }\n        res.push_back(level);\n    }\n    return res;\n}\n// BFS - Time: O(n)  Space: O(n)", "explanation": "Breadth-first traversal using a queue; process one full level at a time by tracking the queue's size before draining it, collecting each level's values into its own list.", "example": {"input": "root = [3,9,20,null,null,15,7]", "output": "[[3],[9,20],[15,7]]"}}, {"category": "Trees", "title": "Lowest Common Ancestor of a Binary Tree", "difficulty": "Medium", "code": "struct TreeNode { int val; TreeNode* left; TreeNode* right; TreeNode(int x): val(x), left(nullptr), right(nullptr) {} };\n\nTreeNode* lowestCommonAncestor(TreeNode* root, TreeNode* p, TreeNode* q) {\n    if (!root || root == p || root == q) return root;\n    TreeNode* left = lowestCommonAncestor(root->left, p, q);\n    TreeNode* right = lowestCommonAncestor(root->right, p, q);\n    if (left && right) return root;\n    return left ? left : right;\n}\n// Time: O(n)  Space: O(h)", "explanation": "Recursively search left and right subtrees for p and q; if both are found in different subtrees the current node is the LCA, otherwise return whichever side found a match.", "example": {"input": "root = [3,5,1,6,2,0,8], p = 5, q = 1", "output": "3"}}, {"category": "Trees", "title": "Validate Binary Search Tree", "difficulty": "Medium", "code": "struct TreeNode { int val; TreeNode* left; TreeNode* right; TreeNode(int x): val(x), left(nullptr), right(nullptr) {} };\n\nbool validate(TreeNode* node, long lo, long hi) {\n    if (!node) return true;\n    if (node->val <= lo || node->val >= hi) return false;\n    return validate(node->left, lo, node->val) && validate(node->right, node->val, hi);\n}\nbool isValidBST(TreeNode* root) {\n    return validate(root, LONG_MIN, LONG_MAX);\n}\n// Time: O(n)  Space: O(h)", "explanation": "Recursively check each node against a valid (lo, hi) range inherited from its ancestors, narrowing the range while descending so every node respects full BST ordering, not just its immediate parent.", "example": {"input": "root = [2,1,3]", "output": "true"}}, {"category": "Trees", "title": "Serialize and Deserialize Binary Tree", "difficulty": "Hard", "code": "struct TreeNode { int val; TreeNode* left; TreeNode* right; TreeNode(int x): val(x), left(nullptr), right(nullptr) {} };\n\nclass Codec {\npublic:\n    string serialize(TreeNode* root) {\n        if (!root) return \"#,\";\n        return to_string(root->val) + \",\" + serialize(root->left) + serialize(root->right);\n    }\n\n    TreeNode* deserialize(string data) {\n        queue<string> tokens;\n        stringstream ss(data);\n        string tok;\n        while (getline(ss, tok, ',')) tokens.push(tok);\n        return build(tokens);\n    }\n\nprivate:\n    TreeNode* build(queue<string>& tokens) {\n        string val = tokens.front(); tokens.pop();\n        if (val == \"#\") return nullptr;\n        TreeNode* node = new TreeNode(stoi(val));\n        node->left = build(tokens);\n        node->right = build(tokens);\n        return node;\n    }\n};\n// Preorder DFS - Time: O(n)  Space: O(n)", "explanation": "Serialize with a preorder DFS, writing '#' for null nodes and commas as separators; deserialize by reading the tokens back in the same preorder sequence to rebuild the tree recursively.", "example": {"input": "root = [1,2,3,null,null,4,5]", "output": "same tree reconstructed after serialize -> deserialize"}}, {"category": "Binary Search", "title": "Binary Search", "difficulty": "Easy", "code": "int search(vector<int>& nums, int target) {\n    int lo = 0, hi = nums.size() - 1;\n    while (lo <= hi) {\n        int mid = lo + (hi - lo) / 2;\n        if (nums[mid] == target) return mid;\n        else if (nums[mid] < target) lo = mid + 1;\n        else hi = mid - 1;\n    }\n    return -1;\n}\n// Time: O(log n)  Space: O(1)", "explanation": "Repeatedly halve the search range by comparing the middle element to the target, discarding the half that can't contain it.", "example": {"input": "nums = [-1,0,3,5,9,12], target = 9", "output": "4"}}, {"category": "Binary Search", "title": "Search Insert Position", "difficulty": "Easy", "code": "int searchInsert(vector<int>& nums, int target) {\n    int lo = 0, hi = nums.size();\n    while (lo < hi) {\n        int mid = lo + (hi - lo) / 2;\n        if (nums[mid] < target) lo = mid + 1;\n        else hi = mid;\n    }\n    return lo;\n}\n// Time: O(log n)  Space: O(1)", "explanation": "Binary search for the first index whose value is not less than target — that's either where it already is or where it should be inserted.", "example": {"input": "nums = [1,3,5,6], target = 5", "output": "2"}}, {"category": "Binary Search", "title": "First Bad Version", "difficulty": "Easy", "code": "// bool isBadVersion(int version); // API provided\nint firstBadVersion(int n) {\n    int lo = 1, hi = n;\n    while (lo < hi) {\n        int mid = lo + (hi - lo) / 2;\n        if (isBadVersion(mid)) hi = mid;\n        else lo = mid + 1;\n    }\n    return lo;\n}\n// Time: O(log n)  Space: O(1)", "explanation": "Binary search over version numbers using the isBadVersion API as the comparison, converging on the first version that is bad.", "example": {"input": "n = 5, first bad version = 4", "output": "4"}}, {"category": "Binary Search", "title": "Search in Rotated Sorted Array", "difficulty": "Medium", "code": "int search(vector<int>& nums, int target) {\n    int lo = 0, hi = nums.size() - 1;\n    while (lo <= hi) {\n        int mid = lo + (hi - lo) / 2;\n        if (nums[mid] == target) return mid;\n        if (nums[lo] <= nums[mid]) { // left half sorted\n            if (nums[lo] <= target && target < nums[mid]) hi = mid - 1;\n            else lo = mid + 1;\n        } else { // right half sorted\n            if (nums[mid] < target && target <= nums[hi]) lo = mid + 1;\n            else hi = mid - 1;\n        }\n    }\n    return -1;\n}\n// Time: O(log n)  Space: O(1)", "explanation": "Binary search adapted for rotation: at each step figure out which half (left or right of mid) is properly sorted, then check if the target lies in that sorted half to decide which side to keep searching.", "example": {"input": "nums = [4,5,6,7,0,1,2], target = 0", "output": "4"}}, {"category": "Binary Search", "title": "Find First and Last Position in Sorted Array", "difficulty": "Medium", "code": "int findBound(vector<int>& nums, int target, bool findFirst) {\n    int lo = 0, hi = nums.size() - 1, res = -1;\n    while (lo <= hi) {\n        int mid = lo + (hi - lo) / 2;\n        if (nums[mid] == target) {\n            res = mid;\n            if (findFirst) hi = mid - 1;\n            else lo = mid + 1;\n        } else if (nums[mid] < target) lo = mid + 1;\n        else hi = mid - 1;\n    }\n    return res;\n}\nvector<int> searchRange(vector<int>& nums, int target) {\n    return {findBound(nums, target, true), findBound(nums, target, false)};\n}\n// Two Binary Searches - Time: O(log n)  Space: O(1)", "explanation": "Run binary search twice — once biased to keep searching left after a match (to find the first occurrence) and once biased to keep searching right (to find the last occurrence).", "example": {"input": "nums = [5,7,7,8,8,10], target = 8", "output": "[3,4]"}}, {"category": "Binary Search", "title": "Find Peak Element", "difficulty": "Medium", "code": "int findPeakElement(vector<int>& nums) {\n    int lo = 0, hi = nums.size() - 1;\n    while (lo < hi) {\n        int mid = lo + (hi - lo) / 2;\n        if (nums[mid] > nums[mid + 1]) hi = mid;\n        else lo = mid + 1;\n    }\n    return lo;\n}\n// Time: O(log n)  Space: O(1)", "explanation": "Binary search using the slope of the array: if the middle element is smaller than its right neighbor, a peak must exist to the right, otherwise search left (including mid).", "example": {"input": "nums = [1,2,3,1]", "output": "2"}}, {"category": "Binary Search", "title": "Koko Eating Bananas", "difficulty": "Medium", "code": "int minEatingSpeed(vector<int>& piles, int h) {\n    int lo = 1, hi = *max_element(piles.begin(), piles.end());\n    while (lo < hi) {\n        int mid = lo + (hi - lo) / 2;\n        long hours = 0;\n        for (int p : piles) hours += (p + mid - 1) / mid;\n        if (hours <= h) hi = mid;\n        else lo = mid + 1;\n    }\n    return lo;\n}\n// Binary Search on Answer - Time: O(n log maxPile)  Space: O(1)", "explanation": "Binary search on the answer (the eating speed): for a candidate speed, compute total hours needed across all piles, and search for the smallest speed where that total is <= h.", "example": {"input": "piles = [3,6,7,11], h = 8", "output": "4"}}, {"category": "Binary Search", "title": "Median of Two Sorted Arrays", "difficulty": "Hard", "code": "double findMedianSortedArrays(vector<int>& A, vector<int>& B) {\n    if (A.size() > B.size()) return findMedianSortedArrays(B, A);\n    int n = A.size(), m = B.size();\n    int lo = 0, hi = n;\n    while (lo <= hi) {\n        int i = lo + (hi - lo) / 2;\n        int j = (n + m + 1) / 2 - i;\n        int Aleft  = (i == 0) ? INT_MIN : A[i - 1];\n        int Aright = (i == n) ? INT_MAX : A[i];\n        int Bleft  = (j == 0) ? INT_MIN : B[j - 1];\n        int Bright = (j == m) ? INT_MAX : B[j];\n\n        if (Aleft <= Bright && Bleft <= Aright) {\n            if ((n + m) % 2 == 0)\n                return (max(Aleft, Bleft) + min(Aright, Bright)) / 2.0;\n            return max(Aleft, Bleft);\n        } else if (Aleft > Bright) hi = i - 1;\n        else lo = i + 1;\n    }\n    return -1.0;\n}\n// Time: O(log(min(n,m)))  Space: O(1)", "explanation": "Binary search on the smaller array to find a partition point such that all elements on the left of both partitions are <= all elements on the right, giving the median in O(log(min(n,m))).", "example": {"input": "nums1 = [1,3], nums2 = [2]", "output": "2.0"}}, {"category": "Heap / Priority Queue", "title": "Kth Largest Element in an Array", "difficulty": "Medium", "code": "int findKthLargest(vector<int>& nums, int k) {\n    priority_queue<int, vector<int>, greater<int>> minHeap;\n    for (int num : nums) {\n        minHeap.push(num);\n        if (minHeap.size() > k) minHeap.pop();\n    }\n    return minHeap.top();\n}\n// Time: O(n log k)  Space: O(k)", "explanation": "Maintain a min-heap of size k; push every element and pop the smallest whenever the heap exceeds size k, so the heap's top ends up as the kth largest.", "example": {"input": "nums = [3,2,1,5,6,4], k = 2", "output": "5"}}, {"category": "Heap / Priority Queue", "title": "Top K Frequent Elements", "difficulty": "Medium", "code": "vector<int> topKFrequent(vector<int>& nums, int k) {\n    unordered_map<int,int> freq;\n    for (int n : nums) freq[n]++;\n    priority_queue<pair<int,int>> maxHeap; // {freq, value}\n    for (auto& [val, f] : freq) maxHeap.push({f, val});\n    vector<int> res;\n    while (k--) { res.push_back(maxHeap.top().second); maxHeap.pop(); }\n    return res;\n}\n// Time: O(n log n)  Space: O(n)", "explanation": "Count frequencies with a hash map, push (frequency, value) pairs into a max-heap, then pop the top k entries.", "example": {"input": "nums = [1,1,1,2,2,3], k = 2", "output": "[1,2]"}}, {"category": "Heap / Priority Queue", "title": "Merge K Sorted Lists", "difficulty": "Hard", "code": "struct ListNode { int val; ListNode* next; ListNode(int x): val(x), next(nullptr) {} };\n\nListNode* mergeKLists(vector<ListNode*>& lists) {\n    auto cmp = [](ListNode* a, ListNode* b) { return a->val > b->val; };\n    priority_queue<ListNode*, vector<ListNode*>, decltype(cmp)> pq(cmp);\n    for (auto l : lists) if (l) pq.push(l);\n\n    ListNode dummy(0);\n    ListNode* tail = &dummy;\n    while (!pq.empty()) {\n        ListNode* node = pq.top(); pq.pop();\n        tail->next = node;\n        tail = tail->next;\n        if (node->next) pq.push(node->next);\n    }\n    return dummy.next;\n}\n// Time: O(N log k)  Space: O(k)", "explanation": "Push the head of each list into a min-heap ordered by value; repeatedly pop the smallest node, attach it to the result, and push its successor if it has one.", "example": {"input": "lists = [[1,4,5],[1,3,4],[2,6]]", "output": "[1,1,2,3,4,4,5,6]"}}, {"category": "Heap / Priority Queue", "title": "Find Median from Data Stream", "difficulty": "Hard", "code": "class MedianFinder {\n    priority_queue<int> lo; // max-heap, lower half\n    priority_queue<int, vector<int>, greater<int>> hi; // min-heap, upper half\npublic:\n    void addNum(int num) {\n        lo.push(num);\n        hi.push(lo.top()); lo.pop();\n        if (hi.size() > lo.size()) { lo.push(hi.top()); hi.pop(); }\n    }\n\n    double findMedian() {\n        if (lo.size() > hi.size()) return lo.top();\n        return (lo.top() + hi.top()) / 2.0;\n    }\n};\n// addNum: O(log n)  findMedian: O(1)", "explanation": "Keep two heaps — a max-heap for the lower half and a min-heap for the upper half — rebalancing after each insert so they differ in size by at most 1; the median is derived from their tops.", "example": {"input": "addNum(1); addNum(2); findMedian(); addNum(3); findMedian()", "output": "1.5, then 2"}}, {"category": "Heap / Priority Queue", "title": "Task Scheduler", "difficulty": "Medium", "code": "int leastInterval(vector<char>& tasks, int n) {\n    unordered_map<char,int> freq;\n    for (char t : tasks) freq[t]++;\n    priority_queue<int> pq;\n    for (auto& [c, f] : freq) pq.push(f);\n\n    int time = 0;\n    while (!pq.empty()) {\n        vector<int> temp;\n        int cycle = n + 1;\n        int i = 0;\n        for (; i < cycle && !pq.empty(); i++) {\n            int f = pq.top(); pq.pop();\n            if (f > 1) temp.push_back(f - 1);\n            time++;\n        }\n        for (int f : temp) pq.push(f);\n        if (!pq.empty()) time += cycle - i; // idle slots only when work remains\n    }\n    return time;\n}\n// Time: O(n log 26)  Space: O(26)", "explanation": "Greedily schedule the most frequent remaining task first each round using a max-heap; if tasks run out before the cooldown window ends but the heap still has work left afterward, the leftover slots in that round are counted as idle time.", "example": {"input": "tasks = [\"A\",\"A\",\"A\",\"B\",\"B\",\"B\"], n = 2", "output": "8"}}, {"category": "Heap / Priority Queue", "title": "Reorganize String", "difficulty": "Medium", "code": "string reorganizeString(string s) {\n    unordered_map<char,int> freq;\n    for (char c : s) freq[c]++;\n    priority_queue<pair<int,char>> pq;\n    for (auto& [c, f] : freq) pq.push({f, c});\n\n    string res;\n    while (pq.size() >= 2) {\n        auto [f1, c1] = pq.top(); pq.pop();\n        auto [f2, c2] = pq.top(); pq.pop();\n        res += c1; res += c2;\n        if (--f1 > 0) pq.push({f1, c1});\n        if (--f2 > 0) pq.push({f2, c2});\n    }\n    if (!pq.empty()) {\n        auto [f, c] = pq.top();\n        if (f > 1) return \"\";\n        res += c;\n    }\n    return res;\n}\n// Time: O(n log 26)  Space: O(26)", "explanation": "Greedily pick the two most frequent remaining characters each round from a max-heap and place them next to each other, which guarantees no two adjacent characters are ever equal (if a valid arrangement exists).", "example": {"input": "s = \"aab\"", "output": "\"aba\""}}, {"category": "Heap / Priority Queue", "title": "IPO", "difficulty": "Hard", "code": "int findMaximizedCapital(int k, int w, vector<int>& profits, vector<int>& capital) {\n    int n = profits.size();\n    vector<pair<int,int>> projects(n); // {capital, profit}\n    for (int i = 0; i < n; i++) projects[i] = {capital[i], profits[i]};\n    sort(projects.begin(), projects.end());\n\n    priority_queue<int> maxProfitHeap; // affordable profits, max-heap\n    int idx = 0;\n    for (int i = 0; i < k; i++) {\n        while (idx < n && projects[idx].first <= w) {\n            maxProfitHeap.push(projects[idx].second);\n            idx++;\n        }\n        if (maxProfitHeap.empty()) break;\n        w += maxProfitHeap.top();\n        maxProfitHeap.pop();\n    }\n    return w;\n}\n// Time: O(n log n)  Space: O(n)", "explanation": "Sort projects by required capital; at each of k rounds, push all projects now affordable into a max-heap ordered by profit and take the most profitable one, growing available capital greedily.", "example": {"input": "k=2, w=0, profits=[1,2,3], capital=[0,1,1]", "output": "4"}}, {"category": "Graphs", "title": "Number of Islands", "difficulty": "Medium", "code": "void dfs(vector<vector<char>>& grid, int i, int j) {\n    if (i < 0 || i >= grid.size() || j < 0 || j >= grid[0].size() || grid[i][j] != '1') return;\n    grid[i][j] = '0';\n    dfs(grid, i + 1, j); dfs(grid, i - 1, j);\n    dfs(grid, i, j + 1); dfs(grid, i, j - 1);\n}\nint numIslands(vector<vector<char>>& grid) {\n    int count = 0;\n    for (int i = 0; i < grid.size(); i++)\n        for (int j = 0; j < grid[0].size(); j++)\n            if (grid[i][j] == '1') { count++; dfs(grid, i, j); }\n    return count;\n}\n// Time: O(m*n)  Space: O(m*n) recursion", "explanation": "DFS flood-fill from every unvisited land cell, sinking the whole connected island (turning '1's to '0's) so it isn't counted again; count how many times a fresh DFS is triggered.", "example": {"input": "grid with 3 separate connected land clusters of '1's", "output": "3"}}, {"category": "Graphs", "title": "Clone Graph", "difficulty": "Medium", "code": "class Node {\npublic:\n    int val;\n    vector<Node*> neighbors;\n    Node(int _val) { val = _val; }\n};\n\nNode* cloneGraph(Node* node, unordered_map<Node*, Node*>& visited) {\n    if (!node) return nullptr;\n    if (visited.count(node)) return visited[node];\n    Node* clone = new Node(node->val);\n    visited[node] = clone;\n    for (Node* nb : node->neighbors)\n        clone->neighbors.push_back(cloneGraph(nb, visited));\n    return clone;\n}\nNode* cloneGraph(Node* node) {\n    unordered_map<Node*, Node*> visited;\n    return cloneGraph(node, visited);\n}\n// DFS - Time: O(V + E)  Space: O(V)", "explanation": "DFS with a hash map from original node to its clone, so each node is cloned exactly once even with cycles, and neighbor lists are recursively rebuilt using the map.", "example": {"input": "adjList = [[2,4],[1,3],[2,4],[1,3]]", "output": "an identical cloned graph structure"}}, {"category": "Graphs", "title": "Flood Fill", "difficulty": "Easy", "code": "void fill(vector<vector<int>>& image, int i, int j, int oldColor, int newColor) {\n    if (i < 0 || i >= image.size() || j < 0 || j >= image[0].size() || image[i][j] != oldColor) return;\n    image[i][j] = newColor;\n    fill(image, i + 1, j, oldColor, newColor);\n    fill(image, i - 1, j, oldColor, newColor);\n    fill(image, i, j + 1, oldColor, newColor);\n    fill(image, i, j - 1, oldColor, newColor);\n}\nvector<vector<int>> floodFill(vector<vector<int>>& image, int sr, int sc, int color) {\n    if (image[sr][sc] != color) fill(image, sr, sc, image[sr][sc], color);\n    return image;\n}\n// Time: O(m*n)  Space: O(m*n)", "explanation": "DFS from the starting pixel, recoloring it and recursively recoloring any 4-directionally adjacent pixel that still has the original color.", "example": {"input": "image, sr=1, sc=1, color=2", "output": "image with the connected region repainted to 2"}}, {"category": "Graphs", "title": "Course Schedule", "difficulty": "Medium", "code": "bool canFinish(int numCourses, vector<vector<int>>& prerequisites) {\n    vector<vector<int>> graph(numCourses);\n    vector<int> indegree(numCourses, 0);\n    for (auto& p : prerequisites) {\n        graph[p[1]].push_back(p[0]);\n        indegree[p[0]]++;\n    }\n    queue<int> q;\n    for (int i = 0; i < numCourses; i++) if (indegree[i] == 0) q.push(i);\n\n    int visited = 0;\n    while (!q.empty()) {\n        int course = q.front(); q.pop();\n        visited++;\n        for (int next : graph[course])\n            if (--indegree[next] == 0) q.push(next);\n    }\n    return visited == numCourses;\n}\n// Topological Sort (Kahn's) - Time: O(V + E)  Space: O(V + E)", "explanation": "Model prerequisites as a directed graph and run Kahn's topological sort (BFS from zero-indegree nodes); if all courses get visited, there's no cycle and the schedule is feasible.", "example": {"input": "numCourses = 2, prerequisites = [[1,0]]", "output": "true"}}, {"category": "Graphs", "title": "Pacific Atlantic Water Flow", "difficulty": "Medium", "code": "void dfs(vector<vector<int>>& heights, vector<vector<bool>>& visited, int i, int j) {\n    visited[i][j] = true;\n    int dirs[4][2] = {{1,0},{-1,0},{0,1},{0,-1}};\n    for (auto& d : dirs) {\n        int ni = i + d[0], nj = j + d[1];\n        if (ni >= 0 && ni < heights.size() && nj >= 0 && nj < heights[0].size() &&\n            !visited[ni][nj] && heights[ni][nj] >= heights[i][j])\n            dfs(heights, visited, ni, nj);\n    }\n}\nvector<vector<int>> pacificAtlantic(vector<vector<int>>& heights) {\n    int m = heights.size(), n = heights[0].size();\n    vector<vector<bool>> pac(m, vector<bool>(n, false)), atl(m, vector<bool>(n, false));\n    for (int i = 0; i < m; i++) { dfs(heights, pac, i, 0); dfs(heights, atl, i, n - 1); }\n    for (int j = 0; j < n; j++) { dfs(heights, pac, 0, j); dfs(heights, atl, m - 1, j); }\n\n    vector<vector<int>> res;\n    for (int i = 0; i < m; i++)\n        for (int j = 0; j < n; j++)\n            if (pac[i][j] && atl[i][j]) res.push_back({i, j});\n    return res;\n}\n// Multi-source DFS - Time: O(m*n)  Space: O(m*n)", "explanation": "Multi-source DFS from all Pacific-border and Atlantic-border cells separately, moving inland only when a neighbor's height is >= the current cell's, marking reachability; the answer is cells reachable from both oceans.", "example": {"input": "heights matrix", "output": "list of [row,col] cells that can flow to both oceans"}}, {"category": "Graphs", "title": "Word Ladder", "difficulty": "Hard", "code": "int ladderLength(string beginWord, string endWord, vector<string>& wordList) {\n    unordered_set<string> dict(wordList.begin(), wordList.end());\n    if (!dict.count(endWord)) return 0;\n\n    queue<string> q;\n    q.push(beginWord);\n    int steps = 1;\n    while (!q.empty()) {\n        int sz = q.size();\n        for (int i = 0; i < sz; i++) {\n            string word = q.front(); q.pop();\n            if (word == endWord) return steps;\n            for (int j = 0; j < word.size(); j++) {\n                char orig = word[j];\n                for (char c = 'a'; c <= 'z'; c++) {\n                    word[j] = c;\n                    if (dict.count(word)) {\n                        dict.erase(word);\n                        q.push(word);\n                    }\n                }\n                word[j] = orig;\n            }\n        }\n        steps++;\n    }\n    return 0;\n}\n// BFS - Time: O(n * 26 * L)  Space: O(n)", "explanation": "BFS over the word graph where edges connect words differing by one letter, generated on the fly by trying every letter substitution at every position and checking against the word set.", "example": {"input": "beginWord = \"hit\", endWord = \"cog\", wordList = [\"hot\",\"dot\",\"dog\",\"lot\",\"log\",\"cog\"]", "output": "5"}}, {"category": "Graphs", "title": "Network Delay Time", "difficulty": "Medium", "code": "int networkDelayTime(vector<vector<int>>& times, int n, int k) {\n    vector<vector<pair<int,int>>> graph(n + 1); // node -> {neighbor, weight}\n    for (auto& t : times) graph[t[0]].push_back({t[1], t[2]});\n\n    vector<int> dist(n + 1, INT_MAX);\n    dist[k] = 0;\n    priority_queue<pair<int,int>, vector<pair<int,int>>, greater<>> pq; // {dist, node}\n    pq.push({0, k});\n\n    while (!pq.empty()) {\n        auto [d, u] = pq.top(); pq.pop();\n        if (d > dist[u]) continue;\n        for (auto& [v, w] : graph[u]) {\n            if (dist[u] + w < dist[v]) {\n                dist[v] = dist[u] + w;\n                pq.push({dist[v], v});\n            }\n        }\n    }\n    int maxDist = 0;\n    for (int i = 1; i <= n; i++) {\n        if (dist[i] == INT_MAX) return -1;\n        maxDist = max(maxDist, dist[i]);\n    }\n    return maxDist;\n}\n// Dijkstra's Algorithm - Time: O(E log V)  Space: O(V + E)", "explanation": "Dijkstra's algorithm from the source node using a min-heap keyed by current shortest distance, relaxing edges as shorter paths are found; the answer is the max distance among all reachable nodes.", "example": {"input": "times = [[2,1,1],[2,3,1],[3,4,1]], n = 4, k = 2", "output": "2"}}, {"category": "Dynamic Programming", "title": "Climbing Stairs", "difficulty": "Easy", "code": "int climbStairs(int n) {\n    if (n <= 2) return n;\n    int prev2 = 1, prev1 = 2;\n    for (int i = 3; i <= n; i++) {\n        int cur = prev1 + prev2;\n        prev2 = prev1;\n        prev1 = cur;\n    }\n    return prev1;\n}\n// Time: O(n)  Space: O(1)", "explanation": "This is really Fibonacci: the number of ways to reach step n equals the ways to reach step n-1 plus the ways to reach step n-2, computed bottom-up with two rolling variables.", "example": {"input": "n = 3", "output": "3"}}, {"category": "Dynamic Programming", "title": "House Robber", "difficulty": "Medium", "code": "int rob(vector<int>& nums) {\n    int prev2 = 0, prev1 = 0;\n    for (int num : nums) {\n        int cur = max(prev1, prev2 + num);\n        prev2 = prev1;\n        prev1 = cur;\n    }\n    return prev1;\n}\n// Time: O(n)  Space: O(1)", "explanation": "DP where at each house you either skip it (carry forward the best from before) or rob it (best from two houses back plus its value); track just two rolling values.", "example": {"input": "nums = [1,2,3,1]", "output": "4"}}, {"category": "Dynamic Programming", "title": "Coin Change", "difficulty": "Medium", "code": "int coinChange(vector<int>& coins, int amount) {\n    vector<int> dp(amount + 1, amount + 1);\n    dp[0] = 0;\n    for (int a = 1; a <= amount; a++)\n        for (int c : coins)\n            if (c <= a) dp[a] = min(dp[a], dp[a - c] + 1);\n    return dp[amount] > amount ? -1 : dp[amount];\n}\n// Unbounded Knapsack style - Time: O(amount * coins)  Space: O(amount)", "explanation": "Bottom-up DP where dp[a] holds the fewest coins to make amount a, built by trying every coin as the 'last coin used' for each amount from 1 up to the target.", "example": {"input": "coins = [1,2,5], amount = 11", "output": "3"}}, {"category": "Dynamic Programming", "title": "Longest Increasing Subsequence", "difficulty": "Medium", "code": "int lengthOfLIS(vector<int>& nums) {\n    vector<int> tails; // tails[i] = smallest tail of increasing subseq of length i+1\n    for (int num : nums) {\n        auto it = lower_bound(tails.begin(), tails.end(), num);\n        if (it == tails.end()) tails.push_back(num);\n        else *it = num;\n    }\n    return tails.size();\n}\n// Binary Search + Patience Sorting - Time: O(n log n)  Space: O(n)", "explanation": "Maintain a 'tails' array where tails[i] is the smallest possible tail value of an increasing subsequence of length i+1; binary search each new number's position to update it in O(log n).", "example": {"input": "nums = [10,9,2,5,3,7,101,18]", "output": "4"}}, {"category": "Dynamic Programming", "title": "Partition Equal Subset Sum", "difficulty": "Medium", "code": "bool canPartition(vector<int>& nums) {\n    int sum = accumulate(nums.begin(), nums.end(), 0);\n    if (sum % 2 != 0) return false;\n    int target = sum / 2;\n    vector<bool> dp(target + 1, false);\n    dp[0] = true;\n    for (int num : nums)\n        for (int j = target; j >= num; j--)\n            dp[j] = dp[j] || dp[j - num];\n    return dp[target];\n}\n// 0/1 Knapsack - Time: O(n * target)  Space: O(target)", "explanation": "Reduces to a 0/1 knapsack: can a subset sum to half the total? A boolean DP array tracks which sums are reachable, updated in reverse order per number to avoid reusing an item twice.", "example": {"input": "nums = [1,5,11,5]", "output": "true"}}, {"category": "Dynamic Programming", "title": "Longest Common Subsequence", "difficulty": "Medium", "code": "int longestCommonSubsequence(string text1, string text2) {\n    int m = text1.size(), n = text2.size();\n    vector<vector<int>> dp(m + 1, vector<int>(n + 1, 0));\n    for (int i = 1; i <= m; i++)\n        for (int j = 1; j <= n; j++)\n            dp[i][j] = (text1[i-1] == text2[j-1]) ? dp[i-1][j-1] + 1\n                                                   : max(dp[i-1][j], dp[i][j-1]);\n    return dp[m][n];\n}\n// Time: O(m*n)  Space: O(m*n)", "explanation": "Classic 2D DP: dp[i][j] extends the match by 1 when the current characters agree, otherwise takes the best of dropping a character from either string.", "example": {"input": "text1 = \"abcde\", text2 = \"ace\"", "output": "3"}}, {"category": "Dynamic Programming", "title": "Edit Distance", "difficulty": "Hard", "code": "int minDistance(string word1, string word2) {\n    int m = word1.size(), n = word2.size();\n    vector<vector<int>> dp(m + 1, vector<int>(n + 1, 0));\n    for (int i = 0; i <= m; i++) dp[i][0] = i;\n    for (int j = 0; j <= n; j++) dp[0][j] = j;\n\n    for (int i = 1; i <= m; i++)\n        for (int j = 1; j <= n; j++) {\n            if (word1[i-1] == word2[j-1]) dp[i][j] = dp[i-1][j-1];\n            else dp[i][j] = 1 + min({dp[i-1][j-1], dp[i-1][j], dp[i][j-1]});\n        }\n    return dp[m][n];\n}\n// Time: O(m*n)  Space: O(m*n)", "explanation": "2D DP where dp[i][j] is the min edits to convert the first i characters of word1 into the first j of word2 — characters match for free, otherwise take the best of insert/delete/replace (1 + min of three neighbors).", "example": {"input": "word1 = \"horse\", word2 = \"ros\"", "output": "3"}}, {"category": "Dynamic Programming", "title": "Maximum Product Subarray", "difficulty": "Medium", "code": "int maxProduct(vector<int>& nums) {\n    int maxProd = nums[0], minProd = nums[0], result = nums[0];\n    for (int i = 1; i < nums.size(); i++) {\n        if (nums[i] < 0) swap(maxProd, minProd);\n        maxProd = max(nums[i], maxProd * nums[i]);\n        minProd = min(nums[i], minProd * nums[i]);\n        result = max(result, maxProd);\n    }\n    return result;\n}\n// Time: O(n)  Space: O(1)", "explanation": "Track both the max and min running products at each index, since a negative number can flip a very negative product into the new max; swap the two before updating whenever the current number is negative.", "example": {"input": "nums = [2,3,-2,4]", "output": "6"}}, {"category": "Backtracking", "title": "Subsets", "difficulty": "Medium", "code": "void backtrack(vector<int>& nums, int start, vector<int>& path, vector<vector<int>>& res) {\n    res.push_back(path);\n    for (int i = start; i < nums.size(); i++) {\n        path.push_back(nums[i]);\n        backtrack(nums, i + 1, path, res);\n        path.pop_back();\n    }\n}\nvector<vector<int>> subsets(vector<int>& nums) {\n    vector<vector<int>> res;\n    vector<int> path;\n    backtrack(nums, 0, path, res);\n    return res;\n}\n// Time: O(2^n)  Space: O(n)", "explanation": "Backtracking that adds every intermediate 'path' to the result before exploring further, choosing each subsequent element from those after the current start index to avoid duplicates.", "example": {"input": "nums = [1,2,3]", "output": "[[],[1],[1,2],[1,2,3],[1,3],[2],[2,3],[3]]"}}, {"category": "Backtracking", "title": "Permutations", "difficulty": "Medium", "code": "void backtrack(vector<int>& nums, vector<bool>& used, vector<int>& path, vector<vector<int>>& res) {\n    if (path.size() == nums.size()) { res.push_back(path); return; }\n    for (int i = 0; i < nums.size(); i++) {\n        if (used[i]) continue;\n        used[i] = true;\n        path.push_back(nums[i]);\n        backtrack(nums, used, path, res);\n        path.pop_back();\n        used[i] = false;\n    }\n}\nvector<vector<int>> permute(vector<int>&
